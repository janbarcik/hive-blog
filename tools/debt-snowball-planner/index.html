<body>
    <header>
        <h1>Debt Snowball Planner</h1>
    </header>
    <div class="container">
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="debtForm">
            <div class="form-group">
                <label for="debtList">Debts (name/balance/rate/minimum):</label>
                <textarea id="debtList" rows="5" placeholder="e.g., Credit Card/5000/18.99/100"></textarea>
            </div>
            <div class="form-group">
                <label for="extraPayment">Extra Monthly Payment:</label>
                <input type="number" id="extraPayment" placeholder="e.g., 200">
            </div>
            <div class="form-group">
                <label for="method">Method:</label>
                <select id="method">
                    <option value="snowball">Snowball</option>
                    <option value="avalanche">Avalanche</option>
                </select>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display: none;">
            <h2>Payoff Plan</h2>
            <div id="payoffOrder"></div>
            <div id="timeline"></div>
            <div id="totalInterestSaved"></div>
            <div id="monthlySchedule"></div>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email">
            <button type="button" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>

            <a href="/tools/">Tools Directory</a>
            <a href="/">Home</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function calculatePayoff() {
            const debtList = document.getElementById('debtList').value.trim();
            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            const method = document.getElementById('method').value;
            
            if (!debtList || isNaN(extraPayment)) {
                alert('Please enter valid debts and extra payment.');
                return;
            }
            
            const debts = debtList.split('\n').map(debt => {
                const [name, balance, rate, minimum] = debt.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });

            if (debts.some(debt => isNaN(debt.balance) || isNaN(debt.rate) || isNaN(debt.minimum))) {
                alert('Please enter valid debt details.');
                return;
            }

            debts.sort((a, b) => method === 'snowball' ? a.balance - b.balance : b.rate - a.rate);

            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;

                for (let debt of debts) {
                    if (debt.balance <= 0) continue;

                    const interest = (debt.balance * (debt.rate / 100)) / 12;
                    totalInterestSaved += interest;
                    const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);
                    debt.balance = debt.balance + interest - payment;
                    monthlyPayment -= (payment - debt.minimum);

                    monthlySchedule.push({
                        month,
                        name: debt.name,
                        payment: payment.toFixed(2),
                        balance: debt.balance.toFixed(2)
                    });

                    if (monthlyPayment <= 0) break;
                }

                timeline.push({
                    month,
                    debts: debts.map(debt => ({ name: debt.name, balance: debt.balance.toFixed(2) }))
                });
            }

            document.getElementById('payoffOrder').innerHTML = `<strong>Payoff Order:</strong> ${debts.map(debt => debt.name).join(', ')}`;
            document.getElementById('timeline').innerHTML = `<strong>Timeline:</strong> ${timeline.length} months`;
            document.getElementById('totalInterestSaved').innerHTML = `<strong>Total Interest Saved:</strong> $${totalInterestSaved.toFixed(2)}`;
            document.getElementById('monthlySchedule').innerHTML = `<strong>Monthly Schedule:</strong> <pre>${JSON.stringify(monthlySchedule, null, 2)}</pre>`;
            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value.trim();
            if (!email) {
                alert('Please enter a valid email address.');
                return;
            }
            alert('Thank you for subscribing!');
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Debt Snowball Planner!`, '_blank');
        }
    </script>
