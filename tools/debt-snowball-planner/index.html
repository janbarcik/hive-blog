    <script>
        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for signing up!');
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function copyToClipboard() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
        }

        function shareOnTwitter() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent('Check out this Debt Snowball Planner!');
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
        }

        function calculateDebtPayoff() {
            const debts = [];
            const debtInputs = document.querySelectorAll('.debt-input');
            debtInputs.forEach(input => {
                const name = input.querySelector('.debt-name').value;
                const balance = parseFloat(input.querySelector('.debt-balance').value);
                const rate = parseFloat(input.querySelector('.debt-rate').value);
                const minimum = parseFloat(input.querySelector('.debt-minimum').value);
                if (name && !isNaN(balance) && !isNaN(rate) && !isNaN(minimum)) {
                    debts.push({ name, balance, rate, minimum });
                }
            });

            const extraPayment = parseFloat(document.getElementById('extra-payment').value) || 0;
            const method = document.getElementById('method').value;

            if (debts.length === 0) {
                alert('Please enter at least one valid debt.');
                return;
            }

            // Sort debts based on the selected method
            if (method === 'snowball') {
                debts.sort((a, b) => a.balance - b.balance);
            } else if (method === 'avalanche') {
                debts.sort((a, b) => b.rate - a.rate);
            }

            let totalInterestSaved = 0;
            let timeline = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;

                debts.forEach(debt => {
                    if (debt.balance > 0) {
                        const interest = (debt.rate / 100 / 12) * debt.balance;
                        totalInterestSaved += interest;
                        const payment = Math.min(debt.balance, debt.minimum + monthlyPayment);
                        debt.balance -= payment - interest;
                        monthlyPayment -= (payment - debt.minimum);
                    }
                });

                timeline.push(`Month ${month}: ${debts.map(debt => `${debt.name}: $${debt.balance.toFixed(2)}`).join(', ')}`);
            }

            document.getElementById('results').innerHTML = `
                <h3>Payoff Order</h3>
                <ul>${debts.map(debt => `<li>${debt.name}</li>`).join('')}</ul>
                <h3>Timeline</h3>
                <ul>${timeline.map(entry => `<li>${entry}</li>`).join('')}</ul>
                <h3>Total Interest Saved</h3>
                <p>$${totalInterestSaved.toFixed(2)}</p>
            `;
        }
    </script>
    <script type="application/ld+json">

        <div class="form-group">
            <label for="method">Payoff Method</label>
            <select id="method">
                <option value="snowball">Snowball</option>
                <option value="avalanche">Avalanche</option>
            </select>
        </div>
        <div id="debt-inputs">
            <div class="debt-input form-group">
                <label>Debt 1</label>
                <input type="text" class="debt-name" placeholder="Name">
                <input type="number" class="debt-balance" placeholder="Balance">
                <input type="number" class="debt-rate" placeholder="Interest Rate (%)">
                <input type="number" class="debt-minimum" placeholder="Minimum Payment">
            </div>
        </div>
        <button onclick="calculateDebtPayoff()">Calculate</button>
        <div class="results" id="results"></div>
