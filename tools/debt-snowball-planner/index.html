<!DOCTYPE html>

<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;

            background-color: #f4f4f9;

        }
        .container {
            max-width: 800px;

        }
        h1, h2, h3, h4 {
            color: #333;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            background-color: #f9f9f9;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;

            background-color: #007bff;

        }

            width: 100%;
            border-collapse: collapse;
        }

        }
        .email-capture {
            margin-top: 20px;

        .email-capture input[type="email"] {
            width: calc(100% - 120px);

        .email-capture button {

<body>
    <div class="container">
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools Directory</a>
        </nav>
        <h1>Debt Snowball Planner</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="debtForm">
            <div class="form-group">
                <label for="debtList">Debts (name/balance/rate/minimum):</label>
                <input type="text" id="debtList" placeholder="e.g., Credit Card/5000/15.99/100">
            </div>
            <div class="form-group">
                <label for="extraPayment">Extra Monthly Payment:</label>
                <input type="number" id="extraPayment" min="0" step="0.01" placeholder="e.g., 200">
            </div>
            <div class="form-group">
                <label for="method">Method:</label>
                <select id="method">
                    <option value="snowball">Snowball</option>
                    <option value="avalanche">Avalanche</option>
                </select>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function calculatePayoff() {
            const debtInput = document.getElementById('debtList').value;
            const extraPayment = parseFloat(document.getElementById('extraPayment').value) || 0;
            const method = document.getElementById('method').value;
            const resultsDiv = document.getElementById('results');

            if (!debtInput) {
                alert('Please enter your debts.');
                return;
            }

            const debts = debtInput.split(',').map(debt => {
                const [name, balance, rate, minimum] = debt.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });

            if (debts.some(debt => isNaN(debt.balance) || isNaN(debt.rate) || isNaN(debt.minimum))) {
                alert('Please enter valid numbers for balance, rate, and minimum.');
                return;
            }

            debts.sort((a, b) => method === 'snowball' ? a.balance - b.balance : b.rate - a.rate);

            let totalInterestSaved = 0;
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;

                for (let debt of debts) {
                    if (debt.balance <= 0) continue;

                    const interest = (debt.balance * (debt.rate / 100)) / 12;
                    totalInterestSaved += interest;
                    const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);
                    debt.balance = debt.balance + interest - payment;
                    monthlyPayment -= (payment - debt.minimum);

                    monthlySchedule.push({
                        month,
                        name: debt.name,
                        payment: payment.toFixed(2),
                        remainingBalance: debt.balance.toFixed(2)
                    });

                    if (monthlyPayment <= 0) break;
                }
            }

            resultsDiv.innerHTML = `
                <h3>Payoff Order & Timeline</h3>
                <ul>${debts.map(debt => `<li>${debt.name}</li>`).join('')}</ul>
                <h3>Total Interest Saved</h3>
                <p>$${totalInterestSaved.toFixed(2)}</p>
                <h3>Monthly Schedule</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Debt</th>
                            <th>Payment</th>
                            <th>Remaining Balance</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${monthlySchedule.map(schedule => `
                            <tr>
                                <td>${schedule.month}</td>
                                <td>${schedule.name}</td>
                                <td>$${schedule.payment}</td>
                                <td>$${schedule.remainingBalance}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter your email.');
                return;
            }
            alert('Thank you for subscribing!');
        }

        function shareTool() {
            const url = window.location.href;
            const text = "Check out this Debt Snowball Planner!";
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterUrl, '_blank');
            });
        }
    </script>
</body>
</html>
