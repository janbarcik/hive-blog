<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/tools/">Tools Directory</a>
        </div>
        <h1>Debt Snowball Planner</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="debtForm">
            <div class="form-group">
                <label for="debtList">Debts (name/balance/rate/minimum)</label>
                <textarea id="debtList" rows="5" placeholder="e.g., Credit Card/5000/18.99/100"></textarea>
            </div>
            <div class="form-group">
                <label for="extraPayment">Extra Monthly Payment</label>
                <input type="number" id="extraPayment" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="method">Payoff Method</label>
                <select id="method">
                    <option value="snowball">Snowball</option>
                    <option value="avalanche">Avalanche</option>
                </select>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function calculatePayoff() {
            const debtList = document.getElementById('debtList').value.trim();
            const extraPayment = parseFloat(document.getElementById('extraPayment').value) || 0;
            const method = document.getElementById('method').value;
            if (!debtList) {
                alert('Please enter your debts.');
                return;
            }
            const debts = debtList.split('\n').map(line => {
                const [name, balance, rate, minimum] = line.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });
            if (debts.some(debt => isNaN(debt.balance) || isNaN(debt.rate) || isNaN(debt.minimum))) {
                alert('Please ensure all debts are entered correctly.');
                return;
            }
            debts.sort((a, b) => method === 'snowball' ? a.balance - b.balance : b.rate - a.rate);
            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];
            let month = 0;
            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;
                debts.forEach(debt => {
                    if (debt.balance > 0) {
                        const interest = (debt.balance * (debt.rate / 100)) / 12;
                        const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);
                        debt.balance += interest - payment;
                        totalInterestSaved += interest;
                        monthlyPayment -= (payment - debt.minimum);
                        monthlySchedule.push({ month, name: debt.name, payment: payment.toFixed(2), balance: debt.balance.toFixed(2) });
                    }
                });
                timeline.push({ month, debts: debts.map(debt => ({ name: debt.name, balance: debt.balance.toFixed(2) })) });
            }
            document.getElementById('results').innerHTML = `
                <h2>Payoff Order & Timeline</h2>
                <pre>${JSON.stringify(timeline, null, 2)}</pre>
                <h2>Total Interest Saved</h2>
                <p>$${totalInterestSaved.toFixed(2)}</p>
                <h2>Monthly Schedule</h2>
                <pre>${JSON.stringify(monthlySchedule, null, 2)}</pre>
            `;
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter your email.');
                return;
            }
            alert('Thank you for subscribing!');
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?text=Check%20out%20this%20Debt%20Snowball%20Planner%20tool!&url=${encodeURIComponent(url)}`;
            window.open(twitterUrl, '_blank');
        }
    </script>
