<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Debt Snowball Planner",
      "description": "Optimize your debt payoff strategy with our Debt Snowball Planner.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/debt-snowball-planner"

    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3, h4 {
            color: #333;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e7f3ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 5px;
        }
        .share-btn {
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .nav {
            margin-bottom: 20px;
        }
        .nav a {
            margin-right: 10px;
            text-decoration: none;
            color: #007bff;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .affiliate-box {
                background-color: #1e1e1e;
            }
            .results {
                background-color: #1e1e1e;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .share-btn, .nav, .email-signup {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </div>
        <h1>Debt Snowball Planner</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="debtForm">
            <div class="form-group">
                <label for="debtList">Debts (name/balance/rate/minimum):</label>
                <input type="text" id="debtList" placeholder="e.g., Credit Card/5000/18.99/100" required>
            </div>
            <div class="form-group">
                <label for="extraPayment">Extra Monthly Payment:</label>
                <input type="number" id="extraPayment" min="0" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="method">Method:</label>
                <select id="method" required>
                    <option value="snowball">Snowball</option>
                    <option value="avalanche">Avalanche</option>
                </select>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function calculatePayoff() {
            const debtListInput = document.getElementById('debtList').value;
            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            const method = document.getElementById('method').value;

            if (!debtListInput || isNaN(extraPayment)) {
                alert('Please fill in all fields correctly.');
                return;
            }

            const debts = debtListInput.split(',').map(debt => {
                const [name, balance, rate, minimum] = debt.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });

            if (debts.some(debt => isNaN(debt.balance) || isNaN(debt.rate) || isNaN(debt.minimum))) {
                alert('Please ensure all debt entries are correct.');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            debts.sort((a, b) => {
                if (method === 'snowball') {
                    return a.balance - b.balance;
                } else {
                    return b.rate - a.rate;
                }
            });

            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];

            while (debts.some(debt => debt.balance > 0)) {
                let month = {};
                let totalPayment = 0;
                debts.forEach(debt => {
                    if (debt.balance > 0) {
                        const interest = (debt.balance * (debt.rate / 100)) / 12;
                        const payment = Math.min(debt.balance + interest, debt.minimum + extraPayment);
                        debt.balance = Math.max(0, debt.balance + interest - payment);
                        totalInterestSaved += interest;
                        totalPayment += payment;
                        month[debt.name] = payment.toFixed(2);
                    }
                });
                timeline.push(month);
                monthlySchedule.push(totalPayment.toFixed(2));
            }

            resultsDiv.innerHTML = `
                <h2>Payoff Order</h2>
                <ul>${debts.map(debt => `<li>${debt.name}</li>`).join('')}</ul>
                <h2>Timeline</h2>
                <pre>${JSON.stringify(timeline, null, 2)}</pre>
                <h2>Total Interest Saved</h2>
                <p>$${totalInterestSaved.toFixed(2)}</p>
                <h2>Monthly Schedule</h2>
                <pre>${monthlySchedule.join('\n')}</pre>
            `;
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for signing up!');
        }

        function shareTool() {
            const url = window.location.href;
            const text = 'Check out this Debt Snowball Planner!';
            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterUrl, '_blank');
            });
        }
    </script>
</body>
</html>
