    <script>
        function calculatePayoff() {
            const debtList = document.getElementById('debtList').value.trim();
            const extraPayment = parseFloat(document.getElementById('extraPayment').value) || 0;
            const method = document.getElementById('method').value;
            
            if (!debtList) {
                alert('Please enter your debts.');
                return;
            }

            const debts = debtList.split('\n').map(debt => {
                const [name, balance, rate, minimum] = debt.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });

            if (debts.some(debt => isNaN(debt.balance) || isNaN(debt.rate) || isNaN(debt.minimum))) {
                alert('Please enter valid numbers for balance, rate, and minimum.');
                return;
            }

            // Sort debts based on the selected method
            if (method === 'snowball') {
                debts.sort((a, b) => a.balance - b.balance);
            } else {
                debts.sort((a, b) => b.rate - a.rate);
            }

            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;

                for (let debt of debts) {
                    if (debt.balance <= 0) continue;

                    const interest = (debt.balance * (debt.rate / 100)) / 12;
                    const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);

                    debt.balance += interest - payment;
                    monthlyPayment -= (payment - debt.minimum);
                    totalInterestSaved += interest;

                    monthlySchedule.push({
                        month,
                        debt: debt.name,
                        payment: payment.toFixed(2),
                        balance: debt.balance.toFixed(2)
                    });

                    if (debt.balance <= 0) {
                        timeline.push(`Paid off ${debt.name} in month ${month}`);
                    }
                }
            }

            document.getElementById('payoffOrder').innerText = 'Payoff Order: ' + debts.map(debt => debt.name).join(', ');
            document.getElementById('timeline').innerText = 'Timeline: ' + timeline.join(', ');
            document.getElementById('totalInterestSaved').innerText = 'Total Interest Saved: $' + totalInterestSaved.toFixed(2);
            document.getElementById('monthlySchedule').innerHTML = '<table><tr><th>Month</th><th>Debt</th><th>Payment</th><th>Balance</th></tr>' +
                monthlySchedule.map(schedule => `<tr><td>${schedule.month}</td><td>${schedule.debt}</td><td>${schedule.payment}</td><td>${schedule.balance}</td></tr>`).join('') +
                '</table>';
            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {

            if (!email) {
                alert('Please enter your email.');
                return;

        }

            const url = window.location.href;
            const text = 'Check out this Debt Snowball Planner!';

            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        }
