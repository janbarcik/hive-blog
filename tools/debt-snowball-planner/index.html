    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;

        }

            margin: 0 10px;

        }
        .container {
            max-width: 800px;
            margin: 20px auto;

            background-color: #fff;

            display: inline-block;
            margin-top: 10px;

            color: #fff;

        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .dark-mode {
            background-color: #121212;
            color: #e0e0e0;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            .affiliate-box {
                background-color: #2e2e2e;
                border-color: #444;
            }
        }
        @media print {

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Debt Snowball Planner</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
    </header>
    <div class="container">
        <div class="ad-slot">
            <!-- AdSense code here -->
        </div>
        <form id="debtForm">
            <div class="form-group">
                <label for="debtList">Debts (name/balance/rate/minimum):</label>
                <input type="text" id="debtList" placeholder="e.g., Loan1/5000/5.5/100, Loan2/3000/7.0/50" required>
            </div>
            <div class="form-group">
                <label for="extraPayment">Extra Monthly Payment:</label>
                <input type="number" id="extraPayment" placeholder="e.g., 200" required>
            </div>
            <div class="form-group">
                <label for="method">Method:</label>
                <select id="method">
                    <option value="snowball">Snowball</option>
                    <option value="avalanche">Avalanche</option>
                </select>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculatePayoff() {
            const debtListInput = document.getElementById('debtList').value;
            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            const method = document.getElementById('method').value;
            const resultsDiv = document.getElementById('results');

            if (!debtListInput || isNaN(extraPayment)) {
                alert('Please enter valid inputs.');
                return;
            }

            const debts = debtListInput.split(',').map(debt => {
                const [name, balance, rate, minimum] = debt.split('/').map(item => item.trim());
                return { name, balance: parseFloat(balance), rate: parseFloat(rate), minimum: parseFloat(minimum) };
            });

            if (debts.some(debt => isNaN(debt.balance) || isNaN(debt.rate) || isNaN(debt.minimum))) {
                alert('Please enter valid debt details.');
                return;
            }

            debts.sort((a, b) => method === 'snowball' ? a.balance - b.balance : b.rate - a.rate);

            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;

                for (let debt of debts) {
                    if (debt.balance <= 0) continue;

                    const interest = (debt.balance * (debt.rate / 100)) / 12;
                    const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);

                    debt.balance += interest - payment;
                    monthlyPayment -= (payment - debt.minimum);

                    if (debt.balance < 0) {
                        monthlyPayment += -debt.balance;
                        debt.balance = 0;
                    }

                    totalInterestSaved += interest;
                }

                timeline.push(`Month ${month}: ${debts.map(debt => `${debt.name}: $${debt.balance.toFixed(2)}`).join(', ')}`);
                monthlySchedule.push(`Month ${month}: Paid $${(extraPayment - monthlyPayment).toFixed(2)}`);
            }

            resultsDiv.innerHTML = `
                <h3>Payoff Order & Timeline</h3>
                <p>${debts.map(debt => debt.name).join(' → ')}</p>
                <ul>${timeline.map(item => `<li>${item}</li>`).join('')}</ul>
                <h3>Total Interest Saved</h3>
                <p>$${totalInterestSaved.toFixed(2)}</p>
                <h3>Monthly Schedule</h3>
                <ul>${monthlySchedule.map(item => `<li>${item}</li>`).join('')}</ul>
            `;
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for subscribing!');
        }

        function shareTool() {
            const url = window.location.href;
            const twitterIntent = `https://twitter.com/intent/tweet?text=Check out this Debt Snowball Planner!&url=${encodeURIComponent(url)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterIntent, '_blank');
            });
        }
    </script>
</body>
</html>
