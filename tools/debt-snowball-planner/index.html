<body>

            <select id="method">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function calculatePayoff() {
            const debtList = document.getElementById('debtList').value.trim();
            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            const method = document.getElementById('method').value;
            if (!debtList || isNaN(extraPayment)) {
                alert('Please enter valid debts and extra payment.');
                return;
            }
            const debts = debtList.split('\n').map(line => {
                const [name, balance, rate, minimum] = line.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });
            if (debts.some(d => isNaN(d.balance) || isNaN(d.rate) || isNaN(d.minimum))) {
                alert('Please enter valid debt details.');
                return;
            }
            const results = document.getElementById('results');
            results.innerHTML = '';
            let payoffOrder, totalInterestSaved, timeline, monthlySchedule;
            if (method === 'snowball') {
                payoffOrder = debts.sort((a, b) => a.balance - b.balance);
            } else {
                payoffOrder = debts.sort((a, b) => b.rate - a.rate);
            }
            let totalBalance = payoffOrder.reduce((sum, debt) => sum + debt.balance, 0);
            let totalMinimum = payoffOrder.reduce((sum, debt) => sum + debt.minimum, 0);
            let monthlyPayment = totalMinimum + extraPayment;
            let month = 0;
            let interestSaved = 0;
            monthlySchedule = [];
            while (totalBalance > 0) {
                month++;
                let monthlyInterest = 0;
                payoffOrder.forEach(debt => {
                    if (debt.balance > 0) {
                        const interest = (debt.balance * (debt.rate / 100)) / 12;
                        monthlyInterest += interest;
                        const payment = Math.min(debt.balance, debt.minimum + (monthlyPayment - totalMinimum));
                        debt.balance -= (payment - interest);
                        monthlyPayment -= payment;
                    }
                });
                totalBalance = payoffOrder.reduce((sum, debt) => sum + debt.balance, 0);
                interestSaved += monthlyInterest;
                monthlySchedule.push({ month, totalBalance, monthlyInterest });
                monthlyPayment = totalMinimum + extraPayment;
            }
            totalInterestSaved = interestSaved;
            timeline = month;
            results.innerHTML = `
                <h3>Payoff Order</h3>
                <ul>${payoffOrder.map(debt => `<li>${debt.name}</li>`).join('')}</ul>
                <h3>Timeline</h3>
                <p>${timeline} months</p>
                <h3>Total Interest Saved</h3>
                <p>$${totalInterestSaved.toFixed(2)}</p>
                <h3>Monthly Schedule</h3>
                <table border="1">
                    <tr><th>Month</th><th>Balance</th><th>Interest</th></tr>
                    ${monthlySchedule.map(s => `<tr><td>${s.month}</td><td>$${s.totalBalance.toFixed(2)}</td><td>$${s.monthlyInterest.toFixed(2)}</td></tr>`).join('')}
                </table>
            `;
        }
        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter a valid email address.');
                return;
            }
            alert('Thank you for subscribing!');
        }
        function shareURL() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
        }
    </script>
