    <script>
        function calculatePayoff() {
            const debtInput = document.getElementById('debt-list').value;
            const extraPayment = parseFloat(document.getElementById('extra-payment').value);
            const method = document.getElementById('method').value;
            const resultsDiv = document.getElementById('results');

            if (!debtInput || isNaN(extraPayment)) {
                alert('Please fill in all fields correctly.');
                return;
            }

            const debts = debtInput.split(',').map(debt => {
                const [name, balance, rate, minimum] = debt.split('/');
                return {
                    name: name.trim(),
                    balance: parseFloat(balance),
                    rate: parseFloat(rate),
                    minimum: parseFloat(minimum)
                };
            });

            if (method === 'snowball') {
                debts.sort((a, b) => a.balance - b.balance);
            } else {
                debts.sort((a, b) => b.rate - a.rate);
            }

            let totalInterestSaved = 0;
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;

                for (let debt of debts) {
                    if (debt.balance <= 0) continue;

                    const interest = (debt.balance * (debt.rate / 100)) / 12;
                    totalInterestSaved += interest;
                    const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);
                    debt.balance += interest - payment;
                    monthlyPayment -= (payment - debt.minimum);

                    monthlySchedule.push({
                        month,
                        name: debt.name,
                        payment: payment.toFixed(2),
                        balance: debt.balance.toFixed(2)
                    });

                    if (monthlyPayment <= 0) break;
                }
            }

            resultsDiv.innerHTML = `
                <h2>Payoff Order & Timeline</h2>
                <ul>
                    ${debts.map(debt => `<li>${debt.name}</li>`).join('')}
                </ul>
                <h3>Total Interest Saved: $${totalInterestSaved.toFixed(2)}</h3>
                <h3>Monthly Schedule</h3>
                <table border="1">
                    <tr>
                        <th>Month</th>
                        <th>Debt Name</th>
                        <th>Payment</th>
                        <th>Remaining Balance</th>
                    </tr>
                    ${monthlySchedule.map(schedule => `
                        <tr>
                            <td>${schedule.month}</td>
                            <td>${schedule.name}</td>
                            <td>$${schedule.payment}</td>
                            <td>$${schedule.balance}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }
