<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Snowball Planner | Optimize Your Debt Payoff</title>
    <meta name="description" content="Use our Debt Snowball Planner to enter all your debts and get an optimized payoff roadmap.">
    <meta property="og:title" content="Debt Snowball Planner | Optimize Your Debt Payoff">
    <meta property="og:description" content="Use our Debt Snowball Planner to enter all your debts and get an optimized payoff roadmap.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/debt-snowball-planner">
    <meta property="og:image" content="https://yourwebsite.com/images/debt-snowball.jpg">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Debt Snowball Planner",
      "description": "Enter all your debts and get an optimized payoff roadmap.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/debt-snowball-planner"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3, h4 {
            color: #333;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9f7ef;
            border-left: 5px solid #28a745;
        }
        .affiliate-btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            input, button {
                background-color: #333;
                color: #e0e0e0;
            }
            button {
                background-color: #0056b3;
            }
            button:hover {
                background-color: #007bff;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-buttons, nav {
                display: none;
            }
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
        }
        nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Debt Snowball Planner</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="debtForm">
            <h2>Enter Your Debts</h2>
            <div id="debtInputs">
                <div class="debt-entry">
                    <input type="text" placeholder="Debt Name" class="debt-name" required>
                    <input type="number" placeholder="Balance" class="debt-balance" required>
                    <input type="number" placeholder="Interest Rate (%)" class="debt-rate" required>
                    <input type="number" placeholder="Minimum Payment" class="debt-minimum" required>
                </div>
            </div>
            <button type="button" onclick="addDebt()">Add Another Debt</button>
            <h2>Extra Monthly Payment</h2>
            <input type="number" id="extraPayment" placeholder="Extra Monthly Payment" required>
            <h2>Payoff Method</h2>
            <select id="payoffMethod" required>
                <option value="snowball">Snowball</option>
                <option value="avalanche">Avalanche</option>
            </select>
            <button type="button" onclick="calculatePayoff()">Calculate Payoff</button>
            <div id="error" class="error"></div>
        </form>
        <div id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button type="button" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function addDebt() {
            const debtInputs = document.getElementById('debtInputs');
            const newDebt = document.createElement('div');
            newDebt.classList.add('debt-entry');
            newDebt.innerHTML = `
                <input type="text" placeholder="Debt Name" class="debt-name" required>
                <input type="number" placeholder="Balance" class="debt-balance" required>
                <input type="number" placeholder="Interest Rate (%)" class="debt-rate" required>
                <input type="number" placeholder="Minimum Payment" class="debt-minimum" required>
            `;
            debtInputs.appendChild(newDebt);
        }

        function calculatePayoff() {
            const debts = [];
            const debtEntries = document.querySelectorAll('.debt-entry');
            let error = '';
            debtEntries.forEach(entry => {
                const name = entry.querySelector('.debt-name').value;
                const balance = parseFloat(entry.querySelector('.debt-balance').value);
                const rate = parseFloat(entry.querySelector('.debt-rate').value);
                const minimum = parseFloat(entry.querySelector('.debt-minimum').value);
                if (!name || isNaN(balance) || isNaN(rate) || isNaN(minimum)) {
                    error = 'Please fill out all fields correctly.';
                } else {
                    debts.push({ name, balance, rate, minimum });
                }
            });

            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            const method = document.getElementById('payoffMethod').value;

            if (isNaN(extraPayment)) {
                error = 'Please enter a valid extra monthly payment.';
            }

            if (error) {
                document.getElementById('error').innerText = error;
                return;
            } else {
                document.getElementById('error').innerText = '';
            }

            // Sort debts based on the selected method
            if (method === 'snowball') {
                debts.sort((a, b) => a.balance - b.balance);
            } else if (method === 'avalanche') {
                debts.sort((a, b) => b.rate - a.rate);
            }

            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = 0;
                debts.forEach(debt => {
                    if (debt.balance > 0) {
                        const interest = (debt.balance * (debt.rate / 100)) / 12;
                        const payment = Math.min(debt.balance + interest, debt.minimum + extraPayment);
                        debt.balance = Math.max(0, debt.balance + interest - payment);
                        monthlyPayment += payment;
                        totalInterestSaved += interest;
                    }
                });
                timeline.push(`Month ${month}: Pay $${monthlyPayment.toFixed(2)}`);
                monthlySchedule.push({ month, payment: monthlyPayment.toFixed(2) });
            }

            const results = `
                <h2>Payoff Order</h2>
                <ul>${debts.map(debt => `<li>${debt.name}</li>`).join('')}</ul>
                <h2>Timeline</h2>
                <ul>${timeline.map(entry => `<li>${entry}</li>`).join('')}</ul>
                <h2>Total Interest Saved</h2>
                <p>$${totalInterestSaved.toFixed(2)}</p>
                <h2>Monthly Schedule</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Payment</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${monthlySchedule.map(schedule => `<tr><td>${schedule.month}</td><td>$${schedule.payment}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('results').innerHTML = results;
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            const text = "Check out this Debt Snowball Planner!";
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
