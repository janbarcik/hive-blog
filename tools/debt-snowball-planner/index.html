<body>
    <div class="container">
        <header>
            <h1>Debt Snowball Planner</h1>
            <p>Enter all your debts and get an optimized payoff roadmap</p>
        </header>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="debtForm">
            <h2>Enter Your Debts</h2>
            <div id="debtInputs">
                <div class="debt-entry">
                    <input type="text" placeholder="Debt Name" required>
                    <input type="number" placeholder="Balance" min="0" step="0.01" required>
                    <input type="number" placeholder="Interest Rate (%)" min="0" step="0.01" required>
                    <input type="number" placeholder="Minimum Payment" min="0" step="0.01" required>
                </div>
            </div>
            <button type="button" onclick="addDebtEntry()">Add Another Debt</button>
            <input type="number" id="extraPayment" placeholder="Extra Monthly Payment" min="0" step="0.01" required>
            <select id="method" required>
                <option value="snowball">Snowball Method</option>
                <option value="avalanche">Avalanche Method</option>
            </select>
            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Payoff Plan</h2>
            <div id="payoffOrder"></div>
            <div id="timeline"></div>
            <div id="totalInterestSaved"></div>
            <div id="monthlySchedule"></div>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best 0% APR balance transfer cards [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>
        <nav>
            <a href="/tools/">Tools Directory</a>
            <a href="/">Home</a>
        </nav>
    </div>
    <script>
        function addDebtEntry() {
            const debtInputs = document.getElementById('debtInputs');
            const newEntry = document.createElement('div');
            newEntry.className = 'debt-entry';
            newEntry.innerHTML = `
                <input type="text" placeholder="Debt Name" required>
                <input type="number" placeholder="Balance" min="0" step="0.01" required>
                <input type="number" placeholder="Interest Rate (%)" min="0" step="0.01" required>
                <input type="number" placeholder="Minimum Payment" min="0" step="0.01" required>
            `;
            debtInputs.appendChild(newEntry);
        }

        document.getElementById('debtForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const debts = [];
            document.querySelectorAll('.debt-entry').forEach(entry => {
                const name = entry.children[0].value;
                const balance = parseFloat(entry.children[1].value);
                const rate = parseFloat(entry.children[2].value);
                const minimum = parseFloat(entry.children[3].value);
                if (name && !isNaN(balance) && !isNaN(rate) && !isNaN(minimum)) {
                    debts.push({ name, balance, rate, minimum });
                }
            });
            const extraPayment = parseFloat(document.getElementById('extraPayment').value);
            const method = document.getElementById('method').value;
            if (debts.length > 0 && !isNaN(extraPayment)) {
                calculatePayoff(debts, extraPayment, method);
            } else {
                alert('Please fill in all fields correctly.');
            }
        });

        function calculatePayoff(debts, extraPayment, method) {
            // Sort debts based on the selected method
            if (method === 'snowball') {
                debts.sort((a, b) => a.balance - b.balance);
            } else {
                debts.sort((a, b) => b.rate - a.rate);
            }

            let totalInterestSaved = 0;
            let timeline = [];
            let monthlySchedule = [];
            let month = 0;

            while (debts.some(debt => debt.balance > 0)) {
                month++;
                let monthlyPayment = extraPayment;
                debts.forEach(debt => {
                    if (debt.balance > 0) {
                        const interest = (debt.balance * (debt.rate / 100)) / 12;
                        const payment = Math.min(debt.balance + interest, debt.minimum + monthlyPayment);
                        debt.balance += interest - payment;
                        monthlyPayment -= (payment - debt.minimum);
                        totalInterestSaved += interest;
                        monthlySchedule.push({ month, debt: debt.name, payment: payment.toFixed(2), balance: debt.balance.toFixed(2) });
                    }
                });
                timeline.push({ month, debts: debts.map(debt => ({ name: debt.name, balance: debt.balance.toFixed(2) })) });
            }

            document.getElementById('payoffOrder').innerHTML = `<h3>Payoff Order</h3><ul>${debts.map(debt => `<li>${debt.name}</li>`).join('')}</ul>`;
            document.getElementById('timeline').innerHTML = `<h3>Timeline</h3><ul>${timeline.map(t => `<li>Month ${t.month}: ${t.debts.map(d => `${d.name}: $${d.balance}`).join(', ')}</li>`).join('')}</ul>`;
            document.getElementById('totalInterestSaved').innerHTML = `<h3>Total Interest Saved</h3><p>$${totalInterestSaved.toFixed(2)}</p>`;
            document.getElementById('monthlySchedule').innerHTML = `<h3>Monthly Schedule</h3><table><tr><th>Month</th><th>Debt</th><th>Payment</th><th>Balance</th></tr>${monthlySchedule.map(m => `<tr><td>${m.month}</td><td>${m.debt}</td><td>$${m.payment}</td><td>$${m.balance}</td></tr>`).join('')}</table>`;
            document.getElementById('results').style.display = 'block';
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Debt Snowball Planner!`;
            window.open(twitterUrl, '_blank');
        }

        }
