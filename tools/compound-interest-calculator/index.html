<style>

    margin: 0 auto;
    padding: 0 1rem;
  }

  .hero {

  .ad-slot {

  /* CARD */
  .card {

  /* FORM */
  .form-group { margin-bottom: 1.1rem; }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .input-prefix, .input-suffix {
    position: absolute;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    pointer-events: none;
  }
  .input-prefix { left: 0.75rem; }
  .input-suffix { right: 0.75rem; }
  input[type="number"], select {
    width: 100%;
    padding: 0.65rem 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 1rem;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
  }
  input.has-prefix { padding-left: 2rem; }
  input.has-suffix { padding-right: 2.2rem; }
  input.error { border-color: var(--danger); }
  .error-msg {
    color: var(--danger);
    font-size: 0.78rem;
    margin-top: 0.3rem;
    display: none;
  }
  .error-msg.show { display: block; }

  /* RANGE SLIDER */
  .range-wrap { margin-top: 0.4rem; }

    cursor: pointer;

  .range-labels {

    border: none;

    font-family: var(--font);

  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(37,99,235,0.4);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: var(--bg);
    color: var(--text-muted);
    border: 1.5px solid var(--border);
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
  }
  .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
  .btn-share {

    color: white;
    font-size: 0.85rem;
    padding: 0.5rem 1rem;
  }

  #results { display: none; }

    display: flex;
    align-items: center;
    justify-content: space-between;

    gap: 0.75rem;
    margin-bottom: 1.25rem;

  .results-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: 1fr; }
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    text-align: center;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .summary-card.final::before { background: var(--primary); }
  .summary-card.interest::before { background: var(--secondary); }
  .summary-card.growth::before { background: var(--accent); }
  .summary-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }
  .summary-value {
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 800;
    line-height: 1.1;
  }
  .summary-card.final .summary-value { color: var(--primary); }
  .summary-card.interest .summary-value { color: var(--secondary); }
  .summary-card.growth .summary-value { color: var(--accent); }
  .summary-sub {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* CHART */
  .chart-container {
    position: relative;
    height: 320px;
    margin-bottom: 1.5rem;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0.25rem;
    border-bottom: 2px solid var(--border);
    margin-bottom: 1.25rem;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 0.6rem 1rem;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    white-space: nowrap;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  .tab-btn:hover { color: var(--primary); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead { background: var(--primary); color: white; }
  th { padding: 0.7rem 0.9rem; text-align: right; font-weight: 600; white-space: nowrap; }
  th:first-child { text-align: left; }
  td { padding: 0.65rem 0.9rem; text-align: right; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  tr:nth-child(even) td { background: rgba(37,99,235,0.03); }
  tr:hover td { background: var(--primary-light); }

  /* COMPARISON TABLE */
