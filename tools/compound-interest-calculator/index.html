<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/compound-interest-calculator.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3, h4 {
            color: #444;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results, .affiliate-box, .ad-slot {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .ad-slot {
            text-align: center;
            margin-bottom: 20px;
        }
        .affiliate-box {
            background-color: #f0f8ff;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .results, .affiliate-box, .ad-slot {
                background-color: #1e1e1e;
            }
            input, button {
                background-color: #333;
                color: #e0e0e0;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-buttons, .navigation {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Compound Interest Calculator",
        "description": "Visualize exactly how your money grows with compound interest over time.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <nav class="navigation">
            <a href="/">Home</a> | <a href="/tools/">Tools Directory</a>
        </nav>
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="principal">Principal Amount ($):</label>
            <input type="number" id="principal" required>
            <span class="error" id="principal-error"></span>

            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" step="0.01" required>
            <span class="error" id="annual_rate_pct-error"></span>

            <label for="years">Number of Years:</label>
            <input type="number" id="years" required>
            <span class="error" id="years-error"></span>

            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency" required>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            <span class="error" id="compound_frequency-error"></span>

            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" required>
            <span class="error" id="monthly_contribution-error"></span>

            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>

        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growthChart"></canvas>
            <table id="comparisonTable"></table>
        </div>

        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>

        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>

        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>

    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || principal <= 0) {
                document.getElementById('principal-error').textContent = "Please enter a valid principal amount.";
                return;
            } else {
                document.getElementById('principal-error').textContent = "";
            }

            if (isNaN(annualRatePct) || annualRatePct <= 0) {
                document.getElementById('annual_rate_pct-error').textContent = "Please enter a valid interest rate.";
                return;
            } else {
                document.getElementById('annual_rate_pct-error').textContent = "";
            }

            if (isNaN(years) || years <= 0) {
                document.getElementById('years-error').textContent = "Please enter a valid number of years.";
                return;
            } else {
                document.getElementById('years-error').textContent = "";
            }

            if (isNaN(monthlyContribution) || monthlyContribution < 0) {
                document.getElementById('monthly_contribution-error').textContent = "Please enter a valid monthly contribution.";
                return;
            } else {
                document.getElementById('monthly_contribution-error').textContent = "";
            }

            const rate = annualRatePct / 100;
            const n = compoundFrequency;
            let totalAmount = principal;
            let totalInterest = 0;
            const yearData = [];

            for (let i = 1; i <= years; i++) {
                for (let j = 0; j < n; j++) {
                    totalAmount += monthlyContribution * 12 / n;
                    totalAmount *= (1 + rate / n);
                }
                const interest = totalAmount - principal - (monthlyContribution * 12 * i);
                totalInterest = interest;
                yearData.push({ year: i, amount: totalAmount.toFixed(2), interest: interest.toFixed(2) });
            }

            document.getElementById('final-amount').textContent = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').textContent = `Total Interest Earned: $${totalInterest.toFixed(2)}`;

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'Investment Growth',
                        data: yearData.map(data => data.amount),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            const table = document.getElementById('comparisonTable');
            table.innerHTML = '<tr><th>Year</th><th>Amount</th><th>Interest</th></tr>';
            yearData.forEach(data => {
                const row = table.insertRow();
                row.insertCell(0).textContent = data.year;
                row.insertCell(1).textContent = `$${data.amount}`;
                row.insertCell(2).textContent = `$${data.interest}`;
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for subscribing!');
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?text=Check out this Compound Interest Calculator! ${url}`, '_blank');
        }
    </script>
</body>
</html>
