<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time. Use our compound interest calculator to see your investment growth.">
    <meta property="og:title" content="Compound Interest Calculator | Investment Growth Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time. Use our compound interest calculator to see your investment growth.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3, h4 {
            color: #333;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #007bff;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
        .affiliate-box {
            background: #e9ecef;
            padding: 10px;
            margin-top: 20px;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            background: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-capture {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 5px;
        }
        .email-capture input[type="email"] {
            width: calc(100% - 110px);
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .email-capture button {
            padding: 10px;
        }
        .share-buttons {
            margin-top: 20px;
        }
        .share-buttons button {
            margin-right: 10px;
        }
        nav {
            background: #343a40;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background: #1e1e1e;
            }
            input[type="number"], select {
                background: #333;
                color: #e0e0e0;
            }
            button {
                background: #1e90ff;
            }
            .affiliate-box {
                background: #333;
            }
            .affiliate-btn {
                background: #28a745;
            }
            nav {
                background: #212529;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-capture, .share-buttons, nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="principal">Principal ($):</label>
            <input type="number" id="principal" required min="0" step="0.01">
            
            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" required min="0" step="0.01">
            
            <label for="years">Years:</label>
            <input type="number" id="years" required min="1">
            
            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency" required>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" required min="0" step="0.01">
            
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growthChart" width="400" height="200"></canvas>
            <table id="comparisonTable" border="1" style="width:100%; margin-top:20px;">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>End Balance</th>
                        <th>Interest Earned</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="copyURL()">Copy URL</button>
            <button onclick="shareOnTwitter()">Share on Twitter</button>
        </div>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRate = parseFloat(document.getElementById('annual_rate_pct').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please enter valid numbers in all fields.');
                return;
            }

            let totalAmount = principal;
            let totalInterest = 0;
            const yearlyData = [];

            for (let i = 1; i <= years; i++) {
                const startBalance = totalAmount;
                for (let j = 0; j < compoundFrequency; j++) {
                    totalAmount += monthlyContribution * 12 / compoundFrequency;
                    totalAmount *= (1 + annualRate / compoundFrequency);
                }
                const interestEarned = totalAmount - startBalance - (monthlyContribution * 12);
                totalInterest += interestEarned;
                yearlyData.push({ year: i, startBalance: startBalance.toFixed(2), endBalance: totalAmount.toFixed(2), interestEarned: interestEarned.toFixed(2) });
            }

            document.getElementById('final-amount').innerText = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').innerText = `Total Interest Earned: $${totalInterest.toFixed(2)}`;

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearlyData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'Investment Growth',
                        data: yearlyData.map(data => data.endBalance),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            const tableBody = document.querySelector('#comparisonTable tbody');
            tableBody.innerHTML = '';
            yearlyData.forEach(data => {
                const row = `<tr>
                    <td>${data.year}</td>
                    <td>$${data.startBalance}</td>
                    <td>$${data.endBalance}</td>
                    <td>$${data.interestEarned}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
                document.getElementById('email').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('URL copied to clipboard!');
            });
        }

        function shareOnTwitter() {
            const url = encodeURIComponent(window.location.href);
            const text = encodeURIComponent('Check out this Compound Interest Calculator!');
            window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
        }
    </script>
</body>
</html>
