<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/og-image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
        }
        form {
            display: grid;
            gap: 10px;
        }
        label {
            font-weight: bold;
        }
        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
        }
        button {
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 8px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-signup {
            margin-top: 20px;
            text-align: center;
        }
        .email-signup input {
            width: auto;
            display: inline-block;
        }
        .email-signup button {
            display: inline-block;
        }
        .share-buttons {
            margin-top: 20px;
            text-align: center;
        }
        .share-buttons button {
            background-color: #1da1f2;
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container, .results, .affiliate-box {
                background-color: #1e1e1e;
            }
            input, select {
                background-color: #333;
                color: #e0e0e0;
            }
            button, .affiliate-btn {
                background-color: #0056b3;
            }
            button:hover, .affiliate-btn:hover {
                background-color: #007bff;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-buttons, .nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Compound Interest Calculator",
        "description": "Visualize exactly how your money grows with compound interest over time.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a> | <a href="/tools/">Tools Directory</a>
        </div>
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="principal">Principal Amount ($):</label>
            <input type="number" id="principal" required min="0" step="0.01">
            
            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" required min="0" step="0.01">
            
            <label for="years">Number of Years:</label>
            <input type="number" id="years" required min="1">
            
            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency" required>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" required min="0" step="0.01">
            
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growthChart"></canvas>
            <table id="comparisonTable" border="1" style="width:100%; margin-top:20px;">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>End Balance</th>
                        <th>Interest Earned</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        
        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        
        <div class="share-buttons">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRate = parseFloat(document.getElementById('annual_rate_pct').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);
            
            if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }
            
            let totalAmount = principal;
            let totalInterest = 0;
            const yearData = [];
            
            for (let year = 1; year <= years; year++) {
                const startBalance = totalAmount;
                for (let month = 0; month < 12; month++) {
                    totalAmount += monthlyContribution;
                    const monthlyRate = annualRate / compoundFrequency;
                    totalAmount *= Math.pow(1 + monthlyRate, compoundFrequency / 12);
                }
                const interestEarned = totalAmount - startBalance - (monthlyContribution * 12);
                totalInterest += interestEarned;
                yearData.push({ year, startBalance, endBalance: totalAmount, interestEarned });
            }
            
            document.getElementById('final-amount').innerText = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').innerText = `Total Interest Earned: $${totalInterest.toFixed(2)}`;
            
            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'End Balance',
                        data: yearData.map(data => data.endBalance),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Year'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Amount ($)'
                            }
                        }
                    }
                }
            });
            
            const tableBody = document.getElementById('comparisonTable').querySelector('tbody');
            tableBody.innerHTML = '';
            yearData.forEach(data => {
                const row = `<tr>
                    <td>${data.year}</td>
                    <td>$${data.startBalance.toFixed(2)}</td>
                    <td>$${data.endBalance.toFixed(2)}</td>
                    <td>$${data.interestEarned.toFixed(2)}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
            
            document.getElementById('results').style.display = 'block';
        }
        
        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }
        
        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`;
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
