    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "applicationCategory": "FinanceApplication",

      "url": "https://yourwebsite.com/compound-interest-calculator"

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            background-color: #f4f4f9;

        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;

            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3, h4 {
            margin-bottom: 10px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;

        button:hover {

        .results, .affiliate-box {
            margin-top: 20px;
            padding: 20px;

        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e9f7ef;
            border: 1px solid #d4edda;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;

            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .nav a {
            text-decoration: none;
            color: #007bff;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        .share-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #17a2b8;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .share-btn:hover {
            background-color: #138496;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container, .results, .affiliate-box {
                background-color: #1e1e1e;
                border-color: #333;
            }
            input, select, button {
                background-color: #333;

                border-color: #444;
            }
            button {
                background-color: #0056b3;
            }
            button:hover {

            }
            .affiliate-box {

                border-color: #3a4a3a;

</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/tools/">Tools Directory</a>
        </div>
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="principal">Principal Amount ($):</label>
            <input type="number" id="principal" required>
            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" step="0.01" required>
            <label for="years">Number of Years:</label>
            <input type="number" id="years" required>
            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency">
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" required>
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growth-chart" width="400" height="200"></canvas>
            <div id="comparison-table"></div>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <form id="email-signup" onsubmit="handleEmailSignup(event)">
            <h3>Get weekly free tools</h3>
            <input type="email" placeholder="Your email" required>
            <button type="submit">Subscribe</button>
        </form>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(monthlyContribution)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const annualRate = annualRatePct / 100;
            const n = compoundFrequency;
            const totalMonths = years * 12;
            let finalAmount = principal;
            let totalInterest = 0;
            const yearlyData = [];

            for (let month = 1; month <= totalMonths; month++) {
                finalAmount += monthlyContribution;
                const interest = finalAmount * (annualRate / n);
                finalAmount += interest;
                totalInterest += interest;

                if (month % 12 === 0) {
                    yearlyData.push({ year: month / 12, amount: finalAmount });
                }
            }

            document.getElementById('final-amount').textContent = `Final Amount: $${finalAmount.toFixed(2)}`;
            document.getElementById('total-interest').textContent = `Total Interest Earned: $${totalInterest.toFixed(2)}`;

            const ctx = document.getElementById('growth-chart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearlyData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'Investment Growth',
                        data: yearlyData.map(data => data.amount),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            let comparisonTable = '<table><tr><th>Year</th><th>Amount</th></tr>';
            yearlyData.forEach(data => {
                comparisonTable += `<tr><td>${data.year}</td><td>$${data.amount.toFixed(2)}</td></tr>`;
            });
            comparisonTable += '</table>';
            document.getElementById('comparison-table').innerHTML = comparisonTable;

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for subscribing!');
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`, '_blank');
        }
    </script>
</body>
