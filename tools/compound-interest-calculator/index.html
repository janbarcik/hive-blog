<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/og-image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h4 {
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-align: center;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-left: 5px solid #007bff;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-signup {
            margin-top: 20px;
        }
        .email-signup input[type="email"] {
            width: calc(100% - 120px);
            padding: 8px;
            box-sizing: border-box;
        }
        .email-signup button {
            width: 100px;
            padding: 8px;
            background-color: #17a2b8;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .email-signup button:hover {
            background-color: #138496;
        }
        .share-btn {
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #ffc107;
            color: #333;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .share-btn:hover {
            background-color: #e0a800;
        }
        nav {
            background-color: #343a40;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            .affiliate-box {
                background-color: #2c2c2c;
            }
            .btn, .affiliate-btn, .email-signup button, .share-btn {
                color: #fff;
            }
        }
        @media print {
            .btn, .affiliate-box, .ad-slot, .email-signup, .share-btn, nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools Directory</a>
    </nav>
    <div class="container">
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <div class="form-group">
            <label for="principal">Principal Amount ($):</label>
            <input type="number" id="principal" min="0" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" min="0" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="years">Number of Years:</label>
            <input type="number" id="years" min="1" required>
        </div>
        <div class="form-group">
            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency" required>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
        </div>
        <div class="form-group">
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" min="0" step="0.01" required>
        </div>
        <button class="btn" onclick="calculateCompoundInterest()">Calculate</button>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Sign Up</button>
        </div>
        <button class="share-btn" onclick="sharePage()">Share this tool</button>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            const ratePerPeriod = annualRatePct / 100 / compoundFrequency;
            const totalPeriods = years * compoundFrequency;
            let finalAmount = principal;
            let totalInterest = 0;
            const yearByYearData = [];

            for (let i = 0; i < totalPeriods; i++) {
                finalAmount = (finalAmount + monthlyContribution * (12 / compoundFrequency)) * (1 + ratePerPeriod);
                if ((i + 1) % compoundFrequency === 0) {
                    yearByYearData.push(finalAmount.toFixed(2));
                }
            }

            totalInterest = finalAmount - principal - (monthlyContribution * 12 * years);

            resultsDiv.innerHTML += `<h2>Results</h2>`;
            resultsDiv.innerHTML += `<p>Final Amount: $${finalAmount.toFixed(2)}</p>`;
            resultsDiv.innerHTML += `<p>Total Interest Earned: $${totalInterest.toFixed(2)}</p>`;

            const ctx = document.createElement('canvas');
            resultsDiv.appendChild(ctx);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({ length: years }, (_, i) => i + 1),
                    datasets: [{
                        label: 'Investment Growth',
                        data: yearByYearData,
                        borderColor: '#007bff',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Year'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Amount ($)'
                            }
                        }
                    }
                }
            });

            resultsDiv.innerHTML += `<h2>Comparison Table</h2>`;
            resultsDiv.innerHTML += `<table border="1" cellpadding="5" cellspacing="0">
                <tr><th>Year</th><th>Amount ($)</th></tr>
                ${yearByYearData.map((amount, index) => `<tr><td>${index + 1}</td><td>${amount}</td></tr>`).join('')}
            </table>`;
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for signing up!');
                // Implement email signup logic here
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`;
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
