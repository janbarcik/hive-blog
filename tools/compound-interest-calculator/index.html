<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/og-image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, select {
            padding: 10px;
            font-size: 1em;
        }
        button {
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results, .affiliate-box, .ad-slot {
            margin-top: 20px;
        }
        .affiliate-box {
            background-color: #e7f1ff;
            padding: 10px;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .ad-slot {
            text-align: center;
            margin: 20px 0;
        }
        .email-capture {
            margin-top: 20px;
            text-align: center;
        }
        .email-capture input {
            width: 70%;
            padding: 10px;
            margin-right: 10px;
        }
        .email-capture button {
            padding: 10px;
        }
        .share-buttons {
            margin-top: 20px;
            text-align: center;
        }
        .share-buttons button {
            padding: 10px;
            background-color: #1da1f2;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .share-buttons button:hover {
            background-color: #0d95e8;
        }
        nav {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            input, select, button {
                background-color: #333;
                color: #e0e0e0;
            }
            .affiliate-box {
                background-color: #2a2a2a;
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .email-capture, .share-buttons, nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <input type="number" id="principal" placeholder="Principal Amount" required>
            <input type="number" id="annual_rate_pct" placeholder="Annual Interest Rate (%)" required>
            <input type="number" id="years" placeholder="Number of Years" required>
            <select id="compound_frequency" required>
                <option value="" disabled selected>Compound Frequency</option>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            <input type="number" id="monthly_contribution" placeholder="Monthly Contribution" required>
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growth-chart"></canvas>
            <table id="comparison-table" border="1" style="width:100%; margin-top:20px;">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>End Balance</th>
                        <th>Interest Earned</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert("Please fill in all fields with valid numbers.");
                return;
            }

            const annualRate = annualRatePct / 100;
            const periods = years * compoundFrequency;
            const monthlyRate = annualRate / 12;
            let finalAmount = principal;
            let totalInterest = 0;
            let yearData = [];

            for (let i = 0; i < periods; i++) {
                const startBalance = finalAmount;
                finalAmount += monthlyContribution;
                finalAmount *= (1 + monthlyRate / compoundFrequency);
                const interestEarned = finalAmount - startBalance - monthlyContribution;
                totalInterest += interestEarned;

                if ((i + 1) % compoundFrequency === 0) {
                    yearData.push({
                        year: (i + 1) / compoundFrequency,
                        startBalance: startBalance.toFixed(2),
                        endBalance: finalAmount.toFixed(2),
                        interestEarned: interestEarned.toFixed(2)
                    });
                }
            }

            document.getElementById('final-amount').innerText = `Final Amount: $${finalAmount.toFixed(2)}`;
            document.getElementById('total-interest').innerText = `Total Interest Earned: $${totalInterest.toFixed(2)}`;

            const ctx = document.getElementById('growth-chart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'End Balance',
                        data: yearData.map(data => data.endBalance),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            display: true,
                            title: {
                                display: true,
                                text: 'Year'
                            }
                        },
                        y: {
                            display: true,
                            title: {
                                display: true,
                                text: 'Balance ($)'
                            }
                        }
                    }
                }
            });

            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';
            yearData.forEach(data => {
                const row = `<tr>
                    <td>${data.year}</td>
                    <td>$${data.startBalance}</td>
                    <td>$${data.endBalance}</td>
                    <td>$${data.interestEarned}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`, '_blank');
        }
    </script>
</body>
</html>
