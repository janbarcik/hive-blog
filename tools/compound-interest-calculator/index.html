        <form id="calculator-form" class="no-print">

    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || principal <= 0) {
                document.getElementById('principal-error').textContent = 'Please enter a valid principal amount.';
                return;
            } else {
                document.getElementById('principal-error').textContent = '';
            }

            if (isNaN(annualRatePct) || annualRatePct <= 0) {
                document.getElementById('rate-error').textContent = 'Please enter a valid interest rate.';
                return;
            } else {
                document.getElementById('rate-error').textContent = '';
            }

            if (isNaN(years) || years <= 0) {
                document.getElementById('years-error').textContent = 'Please enter a valid number of years.';
                return;
            } else {
                document.getElementById('years-error').textContent = '';
            }

            if (isNaN(monthlyContribution) || monthlyContribution < 0) {
                document.getElementById('contribution-error').textContent = 'Please enter a valid monthly contribution.';
                return;
            } else {
                document.getElementById('contribution-error').textContent = '';
            }

            const rate = annualRatePct / 100;
            const n = compoundFrequency;
            let totalAmount = principal;
            let totalInterest = 0;
            const yearlyData = [];

            for (let i = 1; i <= years; i++) {
                for (let j = 0; j < n; j++) {
                    totalAmount += monthlyContribution * 12 / n;
                    totalAmount *= (1 + rate / n);
                }
                const interest = totalAmount - principal - (monthlyContribution * 12 * i);
                yearlyData.push({ year: i, total: totalAmount.toFixed(2), interest: interest.toFixed(2) });
            }

            totalInterest = totalAmount - principal - (monthlyContribution * 12 * years);

            document.getElementById('final-amount').textContent = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').textContent = `Total Interest Earned: $${totalInterest.toFixed(2)}`;

            const ctx = document.getElementById('growth-chart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearlyData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'Total Amount',
                        data: yearlyData.map(data => data.total),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            let comparisonTable = '<table><tr><th>Year</th><th>Total Amount</th><th>Interest Earned</th></tr>';
            yearlyData.forEach(data => {
                comparisonTable += `<tr><td>${data.year}</td><td>$${data.total}</td><td>$${data.interest}</td></tr>`;
            });
            comparisonTable += '</table>';
            document.getElementById('comparison-table').innerHTML = comparisonTable;
        }
