<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/og-image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-align: center;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-signup {
            margin-top: 20px;
            text-align: center;
        }
        .email-signup input[type="email"] {
            width: 70%;
            padding: 8px;
            margin-right: 5px;
        }
        .email-signup button {
            padding: 8px 15px;
        }
        .share-btn {
            margin-top: 10px;
            text-align: center;
        }
        .nav {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav a {
            margin: 0 10px;
            color: #007bff;
            text-decoration: none;
        }
        .nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .results, .affiliate-box {
                background-color: #1e1e1e;
            }
            .btn {
                background-color: #1a73e8;
            }
            .btn:hover {
                background-color: #1558b3;
            }
            .nav a {
                color: #1a73e8;
            }
        }
        @media print {
            .btn, .affiliate-box, .ad-slot, .email-signup, .share-btn, .nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Compound Interest Calculator",
        "description": "Visualize exactly how your money grows with compound interest over time.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </div>
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <div class="form-group">
                <label for="principal">Principal Amount ($):</label>
                <input type="number" id="principal" required>
            </div>
            <div class="form-group">
                <label for="annual_rate_pct">Annual Interest Rate (%):</label>
                <input type="number" id="annual_rate_pct" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="years">Number of Years:</label>
                <input type="number" id="years" required>
            </div>
            <div class="form-group">
                <label for="compound_frequency">Compound Frequency:</label>
                <select id="compound_frequency" required>
                    <option value="1">Annually</option>
                    <option value="4">Quarterly</option>
                    <option value="12">Monthly</option>
                    <option value="365">Daily</option>
                </select>
            </div>
            <div class="form-group">
                <label for="monthly_contribution">Monthly Contribution ($):</label>
                <input type="number" id="monthly_contribution">
            </div>
            <button type="button" class="btn" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growth-chart" width="400" height="200"></canvas>
            <table id="comparison-table" border="1" style="width:100%; margin-top:20px;">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>Interest</th>
                        <th>End Balance</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email">
            <button class="btn" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-btn">
            <button class="btn" onclick="share()">Share this tool</button>
        </div>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value) || 0;

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(compoundFrequency)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const rate = annualRatePct / 100;
            let totalAmount = principal;
            let totalInterest = 0;
            const yearlyData = [];

            for (let year = 1; year <= years; year++) {
                let startBalance = totalAmount;
                for (let period = 0; period < compoundFrequency; period++) {
                    totalAmount += monthlyContribution * 12 / compoundFrequency;
                    totalAmount *= (1 + rate / compoundFrequency);
                }
                let interest = totalAmount - startBalance - monthlyContribution * 12;
                totalInterest += interest;
                yearlyData.push({ year, startBalance, interest, endBalance: totalAmount });
            }

            document.getElementById('final-amount').textContent = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').textContent = `Total Interest Earned: $${totalInterest.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('growth-chart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearlyData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'End Balance',
                        data: yearlyData.map(data => data.endBalance),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            const tableBody = document.getElementById('comparison-table').querySelector('tbody');
            tableBody.innerHTML = '';
            yearlyData.forEach(data => {
                const row = tableBody.insertRow();
                row.insertCell(0).textContent = data.year;
                row.insertCell(1).textContent = `$${data.startBalance.toFixed(2)}`;
                row.insertCell(2).textContent = `$${data.interest.toFixed(2)}`;
                row.insertCell(3).textContent = `$${data.endBalance.toFixed(2)}`;
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function share() {
            const url = window.location.href;
            const twitterIntent = `https://twitter.com/intent/tweet?text=Check out this Compound Interest Calculator! ${url}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterIntent, '_blank');
            });
        }
    </script>
</body>
</html>
