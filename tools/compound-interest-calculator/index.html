<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator | Investment Growth Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/compound-interest-calculator">
    <meta property="og:image" content="https://example.com/og-image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3, h4 {
            color: #333;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results, .affiliate-box, .ad-slot {
            margin-top: 20px;
            padding: 10px;
            background: #f9f9f9;
            border: 1px solid #ddd;
        }
        .affiliate-box {
            background: #e9f7ef;
            border-color: #c3e6cb;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .ad-slot {
            text-align: center;
            background: #fff3cd;
            border-color: #ffeeba;
        }
        .dark-mode {
            background-color: #333;
            color: #f4f4f9;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #333;
                color: #f4f4f9;
            }
            .container {
                background: #444;
                color: #f4f4f9;
            }
            input, button {
                background-color: #555;
                color: #f4f4f9;
            }
            .results, .affiliate-box, .ad-slot {
                background: #555;
                border-color: #666;
            }
            .affiliate-box {
                background: #3e4c3f;
                border-color: #2e3b2f;
            }
            .affiliate-btn {
                background-color: #218838;
            }
            .affiliate-btn:hover {
                background-color: #1e7e34;
            }
            .ad-slot {
                background: #5a5a3d;
                border-color: #4a4a2d;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-btn {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://example.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">Home</a> | <a href="/tools/">Tools</a>
        </nav>
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="principal">Principal ($):</label>
            <input type="number" id="principal" name="principal" required min="0" step="0.01">
            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" name="annual_rate_pct" required min="0" step="0.01">
            <label for="years">Years:</label>
            <input type="number" id="years" name="years" required min="1">
            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency" name="compound_frequency" required>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" name="monthly_contribution" required min="0" step="0.01">
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h3>Results</h3>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growthChart"></canvas>
            <table id="comparisonTable" border="1" style="width:100%; margin-top:20px;">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>End Balance</th>
                        <th>Interest Earned</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <button class="share-btn" onclick="sharePage()">Share this tool</button>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRate = parseFloat(document.getElementById('annual_rate_pct').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRate) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            let totalAmount = principal;
            let totalInterest = 0;
            const yearData = [];

            for (let year = 1; year <= years; year++) {
                let startBalance = totalAmount;
                for (let month = 1; month <= 12; month++) {
                    const monthlyRate = annualRate / compoundFrequency;
                    totalAmount += monthlyContribution;
                    totalAmount *= (1 + monthlyRate);
                }
                const interestEarned = totalAmount - startBalance - (monthlyContribution * 12);
                totalInterest += interestEarned;
                yearData.push({ year, startBalance, endBalance: totalAmount, interestEarned });
            }

            document.getElementById('final-amount').innerText = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').innerText = `Total Interest Earned: $${totalInterest.toFixed(2)}`;

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'End Balance',
                        data: yearData.map(data => data.endBalance),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            yearData.forEach(data => {
                const row = `<tr>
                    <td>${data.year}</td>
                    <td>$${data.startBalance.toFixed(2)}</td>
                    <td>$${data.endBalance.toFixed(2)}</td>
                    <td>$${data.interestEarned.toFixed(2)}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for subscribing!');
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`;
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
