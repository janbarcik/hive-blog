<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/compound-interest.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1rem;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .dark-mode {
            background-color: #333;
            color: #fff;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #333;
                color: #fff;
            }
            .container {
                background-color: #444;
            }
            input, select {
                background-color: #555;
                color: #fff;
            }
            button {
                background-color: #0056b3;
            }
            .results {
                background-color: #555;
            }
            .affiliate-box {
                background-color: #666;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Compound Interest Calculator</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
    </header>
    <div class="container">
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <div class="form-group">
                <label for="principal">Principal Amount ($)</label>
                <input type="number" id="principal" required>
            </div>
            <div class="form-group">
                <label for="annual_rate_pct">Annual Interest Rate (%)</label>
                <input type="number" id="annual_rate_pct" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="years">Years</label>
                <input type="number" id="years" required>
            </div>
            <div class="form-group">
                <label for="compound_frequency">Compound Frequency</label>
                <select id="compound_frequency" required>
                    <option value="1">Annually</option>
                    <option value="4">Quarterly</option>
                    <option value="12">Monthly</option>
                    <option value="365">Daily</option>
                </select>
            </div>
            <div class="form-group">
                <label for="monthly_contribution">Monthly Contribution ($)</label>
                <input type="number" id="monthly_contribution" required>
            </div>
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growthChart" width="400" height="200"></canvas>
            <table id="comparison-table" border="1" style="width:100%; margin-top:10px;">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>End Balance</th>
                        <th>Interest Earned</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="form-group">
            <label for="email">Get weekly free tools</label>
            <input type="email" id="email" placeholder="Enter your email">
            <button type="button" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <button onclick="share()">Share</button>
    </div>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const rate = annualRatePct / 100;
            let totalAmount = principal;
            let totalInterest = 0;
            const data = [];
            const labels = [];

            for (let i = 1; i <= years; i++) {
                const startBalance = totalAmount;
                for (let j = 0; j < compoundFrequency; j++) {
                    totalAmount += monthlyContribution * 12 / compoundFrequency;
                    totalAmount *= (1 + rate / compoundFrequency);
                }
                const interestEarned = totalAmount - startBalance - (monthlyContribution * 12);
                totalInterest += interestEarned;
                data.push(totalAmount.toFixed(2));
                labels.push(`Year ${i}`);
                const row = `<tr><td>${i}</td><td>${startBalance.toFixed(2)}</td><td>${totalAmount.toFixed(2)}</td><td>${interestEarned.toFixed(2)}</td></tr>`;
                document.querySelector('#comparison-table tbody').insertAdjacentHTML('beforeend', row);
            }

            document.getElementById('final-amount').textContent = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').textContent = `Total Interest Earned: $${totalInterest.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Investment Growth',
                        data: data,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function share() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`;
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
