<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/compound-interest-calculator">
    <meta property="og:image" content="https://example.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://example.com/compound-interest-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f9f9f9;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .results {
            margin-top: 20px;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f8ff;
            border: 1px solid #ddd;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .share-btn {
            margin-top: 10px;
            padding: 10px;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .email-capture {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border: 1px solid #ddd;
            text-align: center;
        }
        .email-capture input {
            width: 70%;
            padding: 8px;
            margin-right: 5px;
        }
        .email-capture button {
            padding: 8px 15px;
            background-color: #28a745;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            .affiliate-box {
                background-color: #2a2a2a;
            }
        }
        @media print {
            .affiliate-box, .email-capture, .share-btn, .ad-slot {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
    </header>
    <div class="container">
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=pub-7483634241992957" crossorigin="anonymous"></script>
<ins class="adsbygoogle" style="display:block" data-ad-client="pub-7483634241992957" data-ad-slot="f08c47fec0942fa0" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
        <form id="calculator-form">
            <div class="form-group">
                <label for="principal">Principal Amount ($):</label>
                <input type="number" id="principal" required min="0" step="0.01">
            </div>
            <div class="form-group">
                <label for="annual_rate_pct">Annual Interest Rate (%):</label>
                <input type="number" id="annual_rate_pct" required min="0" step="0.01">
            </div>
            <div class="form-group">
                <label for="years">Number of Years:</label>
                <input type="number" id="years" required min="1" step="1">
            </div>
            <div class="form-group">
                <label for="compound_frequency">Compound Frequency:</label>
                <select id="compound_frequency" required>
                    <option value="1">Annually</option>
                    <option value="4">Quarterly</option>
                    <option value="12">Monthly</option>
                    <option value="365">Daily</option>
                </select>
            </div>
            <div class="form-group">
                <label for="monthly_contribution">Monthly Contribution ($):</label>
                <input type="number" id="monthly_contribution" required min="0" step="0.01">
            </div>
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results">
            <!-- Results will be displayed here -->
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <p>Get weekly free tools</p>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <footer>
        <p>&copy; 2023 Compound Interest Calculator</p>
    </footer>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            const annualRate = annualRatePct / 100;
            const results = [];
            let totalAmount = principal;
            let totalInterest = 0;

            for (let i = 1; i <= years; i++) {
                for (let j = 0; j < compoundFrequency; j++) {
                    totalAmount += monthlyContribution * 12 / compoundFrequency;
                    const interest = totalAmount * (annualRate / compoundFrequency);
                    totalAmount += interest;
                    totalInterest += interest;
                }
                results.push({ year: i, amount: totalAmount.toFixed(2) });
            }

            displayResults(totalAmount, totalInterest, results);
        }

        function displayResults(finalAmount, totalInterest, results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <h2>Results</h2>
                <p>Final Amount: $${finalAmount.toFixed(2)}</p>
                <p>Total Interest: $${totalInterest.toFixed(2)}</p>
                <canvas id="growthChart" width="400" height="200"></canvas>
                <table>
                    <thead>
                        <tr>
                            <th>Year</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${results.map(result => `<tr><td>${result.year}</td><td>$${result.amount}</td></tr>`).join('')}
                    </tbody>
                </table>
            `;

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: results.map(result => `Year ${result.year}`),
                    datasets: [{
                        label: 'Investment Growth',
                        data: results.map(result => result.amount),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            const twitterIntent = `https://twitter.com/intent/tweet?text=Check out this Compound Interest Calculator!&url=${encodeURIComponent(url)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterIntent, '_blank');
            });
        }
    </script>
</body>
</html>
