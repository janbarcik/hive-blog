<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/og-image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h4 {
            color: #333;
        }
        input, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        .results, .affiliate-box, .ad-slot {
            margin-top: 20px;
        }
        .affiliate-box {
            background: #e7f3ff;
            padding: 10px;
            border-left: 5px solid #0073e6;
        }
        .affiliate-btn {
            display: inline-block;
            padding: 10px 15px;
            background: #0073e6;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .ad-slot {
            background: #f9f9f9;
            padding: 10px;
            text-align: center;
        }
        .dark-mode {
            background-color: #333;
            color: #f4f4f9;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #333;
                color: #f4f4f9;
            }
            .container {
                background: #444;
            }
            input, button {
                background: #555;
                color: #f4f4f9;
            }
            .affiliate-box {
                background: #005bb5;
            }
            .affiliate-btn {
                background: #004494;
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .email-signup, .share-buttons, .nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Compound Interest Calculator",
        "description": "Visualize exactly how your money grows with compound interest over time.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">Home</a> | <a href="/tools/">Tools</a>
        </nav>
        <h1>Compound Interest Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="principal">Principal ($):</label>
            <input type="number" id="principal" required>
            <label for="annual_rate_pct">Annual Interest Rate (%):</label>
            <input type="number" id="annual_rate_pct" step="0.01" required>
            <label for="years">Years:</label>
            <input type="number" id="years" required>
            <label for="compound_frequency">Compound Frequency:</label>
            <select id="compound_frequency" required>
                <option value="1">Annually</option>
                <option value="4">Quarterly</option>
                <option value="12">Monthly</option>
                <option value="365">Daily</option>
            </select>
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" required>
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="final-amount"></p>
            <p id="total-interest"></p>
            <canvas id="growthChart"></canvas>
            <table id="comparison-table" border="1" cellspacing="0" cellpadding="5">
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Start Balance</th>
                        <th>End Balance</th>
                        <th>Interest Earned</th>
                    </tr>
                </thead>
                <tbody id="comparison-table-body"></tbody>
            </table>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <div class="share-buttons">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRatePct = parseFloat(document.getElementById('annual_rate_pct').value);
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || isNaN(annualRatePct) || isNaN(years) || isNaN(compoundFrequency) || isNaN(monthlyContribution)) {
                alert('Please enter valid numbers in all fields.');
                return;
            }

            const rate = annualRatePct / 100;
            const n = compoundFrequency;
            let totalAmount = principal;
            let totalInterest = 0;
            const tableBody = document.getElementById('comparison-table-body');
            tableBody.innerHTML = '';
            const data = [];

            for (let year = 1; year <= years; year++) {
                const startBalance = totalAmount;
                for (let i = 0; i < n; i++) {
                    totalAmount += monthlyContribution * 12 / n;
                    totalAmount *= (1 + rate / n);
                }
                const interestEarned = totalAmount - startBalance - (monthlyContribution * 12);
                totalInterest += interestEarned;
                data.push({ year, startBalance, endBalance: totalAmount, interestEarned });
                tableBody.innerHTML += `<tr><td>${year}</td><td>${startBalance.toFixed(2)}</td><td>${totalAmount.toFixed(2)}</td><td>${interestEarned.toFixed(2)}</td></tr>`;
            }

            document.getElementById('final-amount').textContent = `Final Amount: $${totalAmount.toFixed(2)}`;
            document.getElementById('total-interest').textContent = `Total Interest Earned: $${totalInterest.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.year),
                    datasets: [{
                        label: 'End Balance',
                        data: data.map(d => d.endBalance),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Year'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Amount ($)'
                            }
                        }
                    }
                }
            });
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for signing up!');
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`;
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
