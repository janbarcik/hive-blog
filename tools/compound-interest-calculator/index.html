<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator | Investment Growth Calculator</title>
    <meta name="description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:title" content="Compound Interest Calculator | Investment Growth Calculator">
    <meta property="og:description" content="Visualize exactly how your money grows with compound interest over time using our Compound Interest Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/compound-interest-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/compound-interest.jpg">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Compound Interest Calculator",
      "description": "Visualize exactly how your money grows with compound interest over time.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/compound-interest-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            display: block;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
        .affiliate-box {
            background-color: #f9f9f9;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #ddd;
        }
        .affiliate-btn {
            background-color: #28a745;
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            header, footer {
                background-color: #1e1e1e;
            }
            .affiliate-box {
                background-color: #2e2e2e;
                border-color: #444;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-btn {
                display: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Compound Interest Calculator</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
    </header>
    <div class="container">
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <div class="form-group">
                <label for="principal">Principal Amount ($):</label>
                <input type="number" id="principal" name="principal" min="0" required>
                <div class="error" id="principal-error"></div>
            </div>
            <div class="form-group">
                <label for="annual_rate_pct">Annual Interest Rate (%):</label>
                <input type="number" id="annual_rate_pct" name="annual_rate_pct" min="0" step="0.01" required>
                <div class="error" id="rate-error"></div>
            </div>
            <div class="form-group">
                <label for="years">Number of Years:</label>
                <input type="number" id="years" name="years" min="1" required>
                <div class="error" id="years-error"></div>
            </div>
            <div class="form-group">
                <label for="compound_frequency">Compound Frequency:</label>
                <select id="compound_frequency" name="compound_frequency" required>
                    <option value="1">Annually</option>
                    <option value="4">Quarterly</option>
                    <option value="12">Monthly</option>
                    <option value="365">Daily</option>
                </select>
            </div>
            <div class="form-group">
                <label for="monthly_contribution">Monthly Contribution ($):</label>
                <input type="number" id="monthly_contribution" name="monthly_contribution" min="0" required>
                <div class="error" id="contribution-error"></div>
            </div>
            <button type="button" onclick="calculateCompoundInterest()">Calculate</button>
        </form>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best brokerage accounts to maximize your returns [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <button class="share-btn" onclick="sharePage()">Share</button>
    </div>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculateCompoundInterest() {
            const principal = parseFloat(document.getElementById('principal').value);
            const annualRate = parseFloat(document.getElementById('annual_rate_pct').value) / 100;
            const years = parseInt(document.getElementById('years').value);
            const compoundFrequency = parseInt(document.getElementById('compound_frequency').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);

            if (isNaN(principal) || principal < 0) {
                document.getElementById('principal-error').textContent = 'Please enter a valid principal amount.';
                return;
            } else {
                document.getElementById('principal-error').textContent = '';
            }
            if (isNaN(annualRate) || annualRate < 0) {
                document.getElementById('rate-error').textContent = 'Please enter a valid interest rate.';
                return;
            } else {
                document.getElementById('rate-error').textContent = '';
            }
            if (isNaN(years) || years < 1) {
                document.getElementById('years-error').textContent = 'Please enter a valid number of years.';
                return;
            } else {
                document.getElementById('years-error').textContent = '';
            }
            if (isNaN(monthlyContribution) || monthlyContribution < 0) {
                document.getElementById('contribution-error').textContent = 'Please enter a valid monthly contribution.';
                return;
            } else {
                document.getElementById('contribution-error').textContent = '';
            }

            let totalAmount = principal;
            let totalInterest = 0;
            const yearlyData = [];

            for (let i = 1; i <= years; i++) {
                for (let j = 0; j < compoundFrequency; j++) {
                    totalAmount += monthlyContribution * 12 / compoundFrequency;
                    totalAmount *= (1 + annualRate / compoundFrequency);
                }
                const interestForYear = totalAmount - principal - (monthlyContribution * 12 * i);
                yearlyData.push({ year: i, amount: totalAmount.toFixed(2), interest: interestForYear.toFixed(2) });
                totalInterest = interestForYear;
            }

            displayResults(totalAmount, totalInterest, yearlyData);
        }

        function displayResults(finalAmount, totalInterest, yearlyData) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <h3>Results</h3>
                <p>Final Amount: $${finalAmount.toFixed(2)}</p>
                <p>Total Interest Earned: $${totalInterest.toFixed(2)}</p>
                <canvas id="growthChart" width="400" height="200"></canvas>
                <table>
                    <thead>
                        <tr>
                            <th>Year</th>
                            <th>Amount</th>
                            <th>Interest</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${yearlyData.map(data => `
                            <tr>
                                <td>${data.year}</td>
                                <td>$${data.amount}</td>
                                <td>$${data.interest}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            const ctx = document.getElementById('growthChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: yearlyData.map(data => `Year ${data.year}`),
                    datasets: [{
                        label: 'Investment Growth',
                        data: yearlyData.map(data => data.amount),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            display: true,
                            title: {
                                display: true,
                                text: 'Year'
                            }
                        },
                        y: {
                            display: true,
                            title: {
                                display: true,
                                text: 'Amount ($)'
                            }
                        }
                    }
                }
            });
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for subscribing!');
        }

        function sharePage() {
            const url = window.location.href;
            const twitterIntent = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Compound Interest Calculator!`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterIntent, '_blank');
            });
        }
    </script>
</body>
</html>
