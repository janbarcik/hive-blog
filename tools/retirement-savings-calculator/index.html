<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Savings Calculator</title>
    <meta name="description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:title" content="Retirement Savings Calculator">
    <meta property="og:description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/retirement-savings-calculator">
    <meta property="og:image" content="https://example.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            text-align: center;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #28a745;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
        }
        .affiliate-btn:hover {
            background: #218838;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-capture {
            margin-top: 20px;
            text-align: center;
        }
        .email-capture input[type="email"] {
            width: calc(100% - 120px);
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .email-capture button {
            width: 100px;
            padding: 10px;
            background: #17a2b8;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .email-capture button:hover {
            background: #138496;
        }
        .share-buttons {
            margin-top: 20px;
            text-align: center;
        }
        .share-buttons button {
            padding: 10px 20px;
            background: #1da1f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .share-buttons button:hover {
            background: #0d95e8;
        }
        nav {
            background: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            form, .results, .affiliate-box {
                background: #1e1e1e;
                color: #e0e0e0;
            }
            input[type="number"], .email-capture input[type="email"] {
                background: #333;
                color: #e0e0e0;
                border: 1px solid #444;
            }
            button, .affiliate-btn, .email-capture button, .share-buttons button {
                background: #007bff;
            }
            button:hover, .affiliate-btn:hover, .email-capture button:hover, .share-buttons button:hover {
                background: #0056b3;
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .email-capture, .share-buttons, nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Retirement Savings Calculator",
        "description": "Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://example.com/retirement-savings-calculator"
    }
    </script>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Retirement Savings Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <input type="number" id="current_age" placeholder="Current Age" required>
            <input type="number" id="retirement_age" placeholder="Retirement Age" required>
            <input type="number" id="current_savings" placeholder="Current Savings ($)" required>
            <input type="number" id="monthly_contribution" placeholder="Monthly Contribution ($)" required>
            <input type="number" id="expected_return_pct" placeholder="Expected Annual Return (%)" required>
            <input type="number" id="monthly_expenses_retirement" placeholder="Monthly Expenses in Retirement ($)" required>
            <button type="button" onclick="calculateRetirement()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="savings_at_retirement"></p>
            <p id="monthly_drawdown_years"></p>
            <canvas id="success_probability" width="400" height="200"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best IRA accounts for retirement investing [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button type="button" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>
    <script>
        function calculateRetirement() {
            const currentAge = parseInt(document.getElementById('current_age').value);
            const retirementAge = parseInt(document.getElementById('retirement_age').value);
            const currentSavings = parseFloat(document.getElementById('current_savings').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);
            const expectedReturnPct = parseFloat(document.getElementById('expected_return_pct').value) / 100;
            const monthlyExpensesRetirement = parseFloat(document.getElementById('monthly_expenses_retirement').value);

            if (isNaN(currentAge) || isNaN(retirementAge) || isNaN(currentSavings) || isNaN(monthlyContribution) || isNaN(expectedReturnPct) || isNaN(monthlyExpensesRetirement)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const yearsToRetirement = retirementAge - currentAge;
            let futureSavings = currentSavings;

            for (let i = 0; i < yearsToRetirement * 12; i++) {
                futureSavings += monthlyContribution;
                futureSavings *= (1 + expectedReturnPct / 12);
            }

            const annualExpenses = monthlyExpensesRetirement * 12;
            const monthlyDrawdownYears = futureSavings / annualExpenses;

            document.getElementById('savings_at_retirement').innerText = `Savings at Retirement: $${futureSavings.toFixed(2)}`;
            document.getElementById('monthly_drawdown_years').innerText = `Years you can draw down: ${monthlyDrawdownYears.toFixed(2)} years`;

            const ctx = document.getElementById('success_probability').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failure'],
                    datasets: [{
                        data: [monthlyDrawdownYears >= 25 ? 75 : 50, monthlyDrawdownYears >= 25 ? 25 : 50],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Retirement Savings Calculator!`, '_blank');
        }
    </script>
</body>
</html>
