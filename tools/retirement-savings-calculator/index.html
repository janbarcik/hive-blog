<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Savings Calculator</title>
    <meta name="description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:title" content="Retirement Savings Calculator">
    <meta property="og:description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/retirement-savings-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/calculator-thumbnail.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3, h4 {
            margin-bottom: 10px;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 5px 0 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background-color: #007bff;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results, .affiliate-box, .ad-slot, .email-signup, .share {
            margin-top: 20px;
        }
        .affiliate-box {
            background-color: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 10px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .ad-slot {
            text-align: center;
            margin-bottom: 20px;
        }
        .email-signup input[type="email"] {
            width: calc(100% - 120px);
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .email-signup button {
            width: 100px;
        }
        .share button {
            background-color: #1da1f2;
        }
        .share button:hover {
            background-color: #0d95e8;
        }
        nav {
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #007bff;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            input[type="number"], input[type="email"] {
                background-color: #333;
                color: #e0e0e0;
                border: 1px solid #444;
            }
            button, .affiliate-btn {
                background-color: #0056b3;
            }
            button:hover, .affiliate-btn:hover {
                background-color: #007bff;
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .email-signup, .share, nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Retirement Savings Calculator",
        "description": "Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://yourwebsite.com/retirement-savings-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools Directory</a>
        </nav>
        <h1>Retirement Savings Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <label for="current_age">Current Age:</label>
            <input type="number" id="current_age" min="0" max="120" required>
            <label for="retirement_age">Retirement Age:</label>
            <input type="number" id="retirement_age" min="0" max="120" required>
            <label for="current_savings">Current Savings ($):</label>
            <input type="number" id="current_savings" min="0" required>
            <label for="monthly_contribution">Monthly Contribution ($):</label>
            <input type="number" id="monthly_contribution" min="0" required>
            <label for="expected_return_pct">Expected Annual Return (%):</label>
            <input type="number" id="expected_return_pct" min="0" max="100" required>
            <label for="monthly_expenses_retirement">Monthly Expenses in Retirement ($):</label>
            <input type="number" id="monthly_expenses_retirement" min="0" required>
            <button type="button" onclick="calculateRetirement()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="savings_at_retirement"></p>
            <p id="monthly_drawdown_years"></p>
            <canvas id="success_probability" width="400" height="200"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best IRA accounts for retirement investing [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>
    <script>
        function calculateRetirement() {
            const currentAge = parseInt(document.getElementById('current_age').value);
            const retirementAge = parseInt(document.getElementById('retirement_age').value);
            const currentSavings = parseFloat(document.getElementById('current_savings').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);
            const expectedReturnPct = parseFloat(document.getElementById('expected_return_pct').value) / 100;
            const monthlyExpenses = parseFloat(document.getElementById('monthly_expenses_retirement').value);

            if (retirementAge <= currentAge) {
                alert('Retirement age must be greater than current age.');
                return;
            }

            const yearsToRetirement = retirementAge - currentAge;
            let futureValue = currentSavings;

            for (let i = 0; i < yearsToRetirement * 12; i++) {
                futureValue += monthlyContribution;
                futureValue *= (1 + expectedReturnPct / 12);
            }

            const annualExpenses = monthlyExpenses * 12;
            const drawdownYears = futureValue / annualExpenses;

            document.getElementById('savings_at_retirement').innerText = `Savings at Retirement: $${futureValue.toFixed(2)}`;
            document.getElementById('monthly_drawdown_years').innerText = `Years of Expenses Covered: ${drawdownYears.toFixed(2)}`;

            const ctx = document.getElementById('success_probability').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failure'],
                    datasets: [{
                        data: [drawdownYears > 20 ? 80 : drawdownYears * 4, 100 - (drawdownYears > 20 ? 80 : drawdownYears * 4)],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        title: {
                            display: true,
                            text: 'Success Probability'
                        }
                    }
                }
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
                // Add email handling logic here
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Retirement Savings Calculator!`, '_blank');
        }
    </script>
</body>
</html>
