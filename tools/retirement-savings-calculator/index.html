<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Savings Calculator</title>
    <meta name="description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:title" content="Retirement Savings Calculator">
    <meta property="og:description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/retirement-savings-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/retirement-calculator.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f4f9;
            color: #333;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            border-radius: 8px;
        }
        @media (prefers-color-scheme: dark) {
            .container {
                background-color: #1e1e1e;
            }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        @media (prefers-color-scheme: dark) {
            .results {
                background-color: #2e2e2e;
            }
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        @media (prefers-color-scheme: dark) {
            .affiliate-box {
                background-color: #2e2e2e;
            }
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-capture {
            margin-top: 20px;
            text-align: center;
        }
        .email-capture input[type="email"] {
            width: 70%;
            padding: 10px;
            margin-right: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .email-capture button {
            padding: 10px 20px;
            background-color: #ffc107;
            color: #333;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .email-capture button:hover {
            background-color: #e0a800;
        }
        .share-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #1da1f2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .share-btn:hover {
            background-color: #0d95e8;
        }
        nav {
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 10px;
            color: #007bff;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Retirement Savings Calculator",
      "description": "Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/retirement-savings-calculator"
    }
    </script>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Retirement Savings Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="calculator-form">
            <input type="number" id="current_age" placeholder="Current Age" min="0" required>
            <input type="number" id="retirement_age" placeholder="Retirement Age" min="0" required>
            <input type="number" id="current_savings" placeholder="Current Savings ($)" min="0" required>
            <input type="number" id="monthly_contribution" placeholder="Monthly Contribution ($)" min="0" required>
            <input type="number" id="expected_return_pct" placeholder="Expected Annual Return (%)" min="0" required>
            <input type="number" id="monthly_expenses_retirement" placeholder="Monthly Expenses in Retirement ($)" min="0" required>
            <button type="button" onclick="calculateRetirement()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="savings_at_retirement"></p>
            <p id="monthly_drawdown_years"></p>
            <canvas id="successProbabilityChart" width="400" height="200"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best IRA accounts for retirement investing [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <button class="share-btn" onclick="shareTool()">Share this tool</button>
    </div>
    <script>
        function calculateRetirement() {
            const currentAge = parseInt(document.getElementById('current_age').value);
            const retirementAge = parseInt(document.getElementById('retirement_age').value);
            const currentSavings = parseFloat(document.getElementById('current_savings').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);
            const expectedReturnPct = parseFloat(document.getElementById('expected_return_pct').value) / 100;
            const monthlyExpensesRetirement = parseFloat(document.getElementById('monthly_expenses_retirement').value);

            if (isNaN(currentAge) || isNaN(retirementAge) || isNaN(currentSavings) || isNaN(monthlyContribution) || isNaN(expectedReturnPct) || isNaN(monthlyExpensesRetirement)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const yearsToRetirement = retirementAge - currentAge;
            let futureValue = currentSavings;

            for (let i = 0; i < yearsToRetirement * 12; i++) {
                futureValue += monthlyContribution;
                futureValue *= (1 + expectedReturnPct / 12);
            }

            const annualExpenses = monthlyExpensesRetirement * 12;
            const drawdownYears = futureValue / annualExpenses;

            document.getElementById('savings_at_retirement').innerText = `Savings at Retirement: $${futureValue.toFixed(2)}`;
            document.getElementById('monthly_drawdown_years').innerText = `Years you can draw down: ${drawdownYears.toFixed(1)} years`;

            const ctx = document.getElementById('successProbabilityChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failure'],
                    datasets: [{
                        data: [drawdownYears >= 20 ? 100 : drawdownYears * 5, drawdownYears >= 20 ? 0 : 100 - drawdownYears * 5],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
                document.getElementById('email').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?text=Check out this Retirement Savings Calculator!&url=${encodeURIComponent(url)}`, '_blank');
        }
    </script>
</body>
</html>
