<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Savings Calculator</title>
    <meta name="description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:title" content="Retirement Savings Calculator">
    <meta property="og:description" content="Find out exactly how much you need to retire at your target age with our Retirement Savings Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/retirement-savings-calculator">
    <meta property="og:image" content="https://example.com/og-image.jpg">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Retirement Savings Calculator",
      "description": "Find out exactly how much you need to retire at your target age.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://example.com/retirement-savings-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-capture {
            margin-top: 20px;
            text-align: center;
        }
        .email-capture input[type="email"] {
            width: 70%;
            padding: 8px;
            margin-right: 5px;
        }
        .email-capture button {
            padding: 8px 15px;
        }
        .share-btn {
            margin-top: 20px;
            text-align: center;
        }
        .share-btn button {
            padding: 10px 15px;
            background-color: #1da1f2;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        nav {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .results, .affiliate-box {
                background-color: #1e1e1e;
            }
            button, .affiliate-btn {
                background-color: #bb86fc;
            }
            button:hover, .affiliate-btn:hover {
                background-color: #3700b3;
            }
            nav {
                background-color: #1f1f1f;
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .email-capture, .share-btn, nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Retirement Savings Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="retirementForm">
            <div class="form-group">
                <label for="current_age">Current Age</label>
                <input type="number" id="current_age" min="0" required>
            </div>
            <div class="form-group">
                <label for="retirement_age">Retirement Age</label>
                <input type="number" id="retirement_age" min="0" required>
            </div>
            <div class="form-group">
                <label for="current_savings">Current Savings ($)</label>
                <input type="number" id="current_savings" min="0" required>
            </div>
            <div class="form-group">
                <label for="monthly_contribution">Monthly Contribution ($)</label>
                <input type="number" id="monthly_contribution" min="0" required>
            </div>
            <div class="form-group">
                <label for="expected_return_pct">Expected Annual Return (%)</label>
                <input type="number" id="expected_return_pct" min="0" step="0.1" required>
            </div>
            <div class="form-group">
                <label for="monthly_expenses_retirement">Monthly Expenses in Retirement ($)</label>
                <input type="number" id="monthly_expenses_retirement" min="0" required>
            </div>
            <button type="button" onclick="calculateRetirement()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="savings_at_retirement"></p>
            <p id="monthly_drawdown_years"></p>
            <canvas id="success_probability" width="400" height="200"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Best IRA accounts for retirement investing [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-btn">
            <button onclick="shareTool()">Share this tool</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function calculateRetirement() {
            const currentAge = parseInt(document.getElementById('current_age').value);
            const retirementAge = parseInt(document.getElementById('retirement_age').value);
            const currentSavings = parseFloat(document.getElementById('current_savings').value);
            const monthlyContribution = parseFloat(document.getElementById('monthly_contribution').value);
            const expectedReturnPct = parseFloat(document.getElementById('expected_return_pct').value);
            const monthlyExpensesRetirement = parseFloat(document.getElementById('monthly_expenses_retirement').value);

            if (isNaN(currentAge) || isNaN(retirementAge) || isNaN(currentSavings) || isNaN(monthlyContribution) || isNaN(expectedReturnPct) || isNaN(monthlyExpensesRetirement)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const yearsToRetirement = retirementAge - currentAge;
            const annualReturn = expectedReturnPct / 100;
            let futureSavings = currentSavings;

            for (let i = 0; i < yearsToRetirement; i++) {
                futureSavings += monthlyContribution * 12;
                futureSavings *= (1 + annualReturn);
            }

            const annualExpenses = monthlyExpensesRetirement * 12;
            const drawdownYears = Math.floor(futureSavings / annualExpenses);

            document.getElementById('savings_at_retirement').innerText = `Savings at Retirement: $${futureSavings.toFixed(2)}`;
            document.getElementById('monthly_drawdown_years').innerText = `Years you can draw down: ${drawdownYears} years`;

            const ctx = document.getElementById('success_probability').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Failure'],
                    datasets: [{
                        data: [drawdownYears, 30 - drawdownYears],
                        backgroundColor: ['#28a745', '#dc3545']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            document.getElementById('results').style.display = 'block';
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?text=Check out this Retirement Savings Calculator!&url=${encodeURIComponent(url)}`, '_blank');
        }
    </script>
</body>
</html>
