<style>
  :root {

  /* HERO */

  .ad-slot {

    border-radius: var(--radius-sm);

  /* MAIN LAYOUT */

  /* CARDS */
  .card {

    box-shadow: var(--shadow);

  .card-title {

    gap: 0.5rem;
    color: var(--text);
  }

  /* FORM ELEMENTS */
  label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }
  textarea, input[type="text"], input[type="email"], input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem;

    color: var(--text);
    font-family: inherit;

    resize: vertical;
  }
  textarea:focus, input:focus {

  textarea { min-height: 200px; }

  /* API KEY SECTION */
  .api-section {

    margin-bottom: 1.5rem;

  .api-toggle { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 1.1rem; padding: 0.5rem; }

  /* BUTTONS */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.75rem 1.5rem;
    border-radius: var(--radius-sm);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    box-shadow: 0 4px 14px rgba(79,70,229,0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }
  .btn-full { width: 100%; }
  .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.82rem; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

  /* ANALYZE BUTTON AREA */
  .analyze-area { text-align: center; margin: 1.5rem 0; }
  .analyze-area .btn { min-width: 220px; padding: 1rem 2rem; font-size: 1.05rem; }

    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--danger);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    font-size: 0.875rem;
    margin-top: 0.5rem;
    display: none;
  }
  .error-msg.show { display: block; }

  /* LOADING */
  .loading-overlay {
    display: none;
    text-align: center;
    padding: 2rem;
  }
  .loading-overlay.show { display: block; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULTS */
  #results { display: none; }
  #results.show { display: block; }

  /* SCORE CIRCLE */
  .score-section {
    text-align: center;
    padding: 2rem 1rem;
  }
  .score-circle-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin: 0 auto 1rem;
  }
  .score-circle-svg { transform: rotate(-90deg); }
  .score-circle-bg { fill: none; stroke: var(--border); stroke-width: 12; }
  .score-circle-fill {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .score-number {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
  }
  .score-label {
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .score-grade {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }
  .score-desc { font-size: 0.875rem; color: var(--text-muted); }

  /* SCORE BREAKDOWN */
  .breakdown-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  @media (max-width: 480px) { .breakdown-grid { grid-template-columns: 1fr 1fr; } }
  .breakdown-item {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 0.75rem;
    text-align: center;

  .breakdown-val { font-size: 1.4rem; font-weight: 800; }
  .breakdown-lbl { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; margin-top: 0.1rem; }

  /* KEYWORDS */
  .keyword-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
  .kw-tag {

    font-weight: 600;

    align-items: center;
    gap: 0.3rem;

  .kw-missing { background: rgba(239,68,68,0.1); color: #dc2626; border: 1px solid rgba(239,68,68,0.25); }
  .kw-partial { background: rgba(245,158,11,0.1); color: #d97706; border: 1px solid rgba(245,158,11,0.25); }

  /* HEATMAP */
  .heatmap-wrap { margin-top: 0.75rem; }
  .heatmap-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }
  .heatmap-label { font-size: 0.8rem; font-weight: 600; min-width: 130px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .heatmap-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 20px; overflow: hidden; }
