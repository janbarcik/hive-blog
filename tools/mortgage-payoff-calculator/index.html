<body>
    <header>
        <h1>Mortgage Payoff Calculator</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools Directory</a>
    </nav>
    <div class="container">
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($):</label>
                <input type="number" id="loan_amount" required>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%):</label>
                <input type="number" step="0.01" id="interest_rate" required>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (years):</label>
                <input type="number" id="loan_term_years" required>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
                <input type="number" id="extra_monthly_payment" required>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display: none;">
            <h2>Results</h2>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>

            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button type="button" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-btn">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2023 Your Company</p>
    </footer>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths) || isNaN(extraPayment)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            const monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let remainingBalance = loanAmount;
            let totalInterestPaid = 0;
            let months = 0;

            const originalAmortization = [];
            const newAmortization = [];

            while (remainingBalance > 0) {
                const interestPayment = remainingBalance * interestRate;
                const principalPayment = monthlyPayment - interestPayment;
                totalInterestPaid += interestPayment;
                remainingBalance -= principalPayment;
                originalAmortization.push({ month: months, balance: remainingBalance });

                if (remainingBalance <= 0) break;
                months++;
            }

            const originalTotalInterest = totalInterestPaid;
            remainingBalance = loanAmount;
            totalInterestPaid = 0;
            months = 0;

            while (remainingBalance > 0) {
                const interestPayment = remainingBalance * interestRate;
                const principalPayment = monthlyPayment + extraPayment - interestPayment;
                totalInterestPaid += interestPayment;
                remainingBalance -= principalPayment;
                newAmortization.push({ month: months, balance: remainingBalance });

                if (remainingBalance <= 0) break;
                months++;
            }

            const newTotalInterest = totalInterestPaid;
            const yearsSaved = (originalAmortization.length - newAmortization.length) / 12;
            const interestSaved = originalTotalInterest - newTotalInterest;

            document.getElementById('years_saved').textContent = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').textContent = `Interest Saved: $${interestSaved.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: originalAmortization.map(a => a.month),
                    datasets: [
                        {
                            label: 'Original Balance',
                            data: originalAmortization.map(a => a.balance),
                            borderColor: 'rgba(255, 99, 132, 1)',
                            fill: false
                        },
                        {
                            label: 'New Balance',
                            data: newAmortization.map(a => a.balance),
                            borderColor: 'rgba(54, 162, 235, 1)',
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Months'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Balance ($)'
                            }
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter a valid email address.');
                return;
            }
            alert('Thank you for subscribing!');
            // Add email handling logic here
        }

        function sharePage() {
            const url = window.location.href;
            const text = "Check out this Mortgage Payoff Calculator!";
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
