<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments can reduce your mortgage timeline and total interest.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments can reduce your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://example.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e7f3fe;
            border: 1px solid #b3d4fc;
            padding: 15px;
            margin-top: 20px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .affiliate-box {
                background-color: #1e1e1e;
                border-color: #333;
            }
            .affiliate-btn {
                background-color: #0056b3;
            }
            .results {
                background-color: #1e1e1e;
                border-color: #333;
            }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments can reduce your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://example.com/mortgage-payoff-calculator"
    }
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="/" style="color: #fff; text-decoration: none; margin-right: 15px;">Home</a>
            <a href="/tools/" style="color: #fff; text-decoration: none;">Tools</a>
        </nav>
    </header>
    <div class="container">
        <h1>Mortgage Payoff Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($):</label>
                <input type="number" id="loan_amount" required>
                <div class="error" id="loan_amount_error"></div>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%):</label>
                <input type="number" id="interest_rate" step="0.01" required>
                <div class="error" id="interest_rate_error"></div>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (years):</label>
                <input type="number" id="loan_term_years" required>
                <div class="error" id="loan_term_years_error"></div>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
                <input type="number" id="extra_monthly_payment" required>
                <div class="error" id="extra_monthly_payment_error"></div>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="form-group">
            <label for="email">Get weekly free tools:</label>
            <input type="email" id="email" placeholder="Enter your email">
            <button type="button" onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <button onclick="sharePage()">Share</button>
    </div>
    <footer>
        <p>&copy; 2023 Mortgage Tools</p>
    </footer>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermYears = parseInt(document.getElementById('loan_term_years').value);
            const extraMonthlyPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || loanAmount <= 0) {
                document.getElementById('loan_amount_error').innerText = "Please enter a valid loan amount.";
                return;
            } else {
                document.getElementById('loan_amount_error').innerText = "";
            }

            if (isNaN(interestRate) || interestRate <= 0) {
                document.getElementById('interest_rate_error').innerText = "Please enter a valid interest rate.";
                return;
            } else {
                document.getElementById('interest_rate_error').innerText = "";
            }

            if (isNaN(loanTermYears) || loanTermYears <= 0) {
                document.getElementById('loan_term_years_error').innerText = "Please enter a valid loan term.";
                return;
            } else {
                document.getElementById('loan_term_years_error').innerText = "";
            }

            if (isNaN(extraMonthlyPayment) || extraMonthlyPayment < 0) {
                document.getElementById('extra_monthly_payment_error').innerText = "Please enter a valid extra payment.";
                return;
            } else {
                document.getElementById('extra_monthly_payment_error').innerText = "";
            }

            const n = loanTermYears * 12;
            const monthlyPayment = (loanAmount * interestRate) / (1 - Math.pow(1 + interestRate, -n));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (balance > 0) {
                const interest = balance * interestRate;
                totalInterest += interest;
                balance = balance + interest - (monthlyPayment + extraMonthlyPayment);
                months++;
                if (balance < 0) balance = 0;
            }

            const originalTotalInterest = (monthlyPayment * n) - loanAmount;
            const yearsSaved = (n - months) / 12;
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('years_saved').innerText = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').innerText = `Interest Saved: $${interestSaved.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original', 'With Extra Payment'],
                    datasets: [{
                        label: 'Total Interest Paid',
                        data: [originalTotalInterest, totalInterest],
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Subscribed with ${email}`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Mortgage Payoff Calculator!`, '_blank');
        }
    </script>
</body>
</html>
