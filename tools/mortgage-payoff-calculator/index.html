    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Mortgage Payoff Calculator",
        "description": "Calculate how extra payments can reduce your mortgage timeline and interest.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://yourwebsite.com/mortgage-payoff-calculator"
    }
    </script>
</head>
<body>
    <header>
        <h1>Mortgage Payoff Calculator</h1>
    </header>
    <nav class="nav">
        <a href="/">Home</a>
        <a href="/tools/">Tools Directory</a>
    </nav>
    <main>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <div class="input-group">
            <label for="loan_amount">Loan Amount ($):</label>
            <input type="number" id="loan_amount" min="0" required>
        </div>
        <div class="input-group">
            <label for="interest_rate">Interest Rate (%):</label>
            <input type="number" id="interest_rate" min="0" step="0.01" required>
        </div>
        <div class="input-group">
            <label for="loan_term_years">Loan Term (Years):</label>
            <input type="number" id="loan_term_years" min="1" required>
        </div>
        <div class="input-group">
            <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
            <input type="number" id="extra_monthly_payment" min="0" required>
        </div>
        <button onclick="calculatePayoff()">Calculate</button>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-buttons">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths) || isNaN(extraPayment)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const monthlyPayment = (loanAmount * interestRate) / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let remainingBalance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (remainingBalance > 0) {
                const interestPayment = remainingBalance * interestRate;
                const principalPayment = Math.min(monthlyPayment + extraPayment - interestPayment, remainingBalance);
                totalInterest += interestPayment;
                remainingBalance -= principalPayment;
                months++;
            }

            const originalTotalInterest = (monthlyPayment * loanTermMonths) - loanAmount;
            const yearsSaved = (loanTermMonths - months) / 12;
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('results').innerHTML = `
                <h3>Results</h3>
                <p>Years Saved: ${yearsSaved.toFixed(2)}</p>
                <p>Interest Saved: $${interestSaved.toFixed(2)}</p>
                <canvas id="amortizationChart" width="400" height="200"></canvas>
            `;

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Loan', 'With Extra Payments'],
                    datasets: [{
                        label: 'Total Interest',
                        data: [originalTotalInterest, totalInterest],
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
                // Here you would typically send the email to your server
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            const text = 'Check out this Mortgage Payoff Calculator!';
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterUrl, '_blank');
            });
        }
    </script>
</body>
