<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/image.jpg">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments slash your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/mortgage-payoff-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background-color: #007bff;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #333;
        }
        nav a {
            color: #fff;
            padding: 10px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #575757;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .results {
            margin-top: 20px;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #0056b3;
        }
        .email-capture {
            margin-top: 20px;
            text-align: center;
        }
        .email-capture input[type="email"] {
            padding: 8px;
            width: 70%;
            margin-right: 10px;
        }
        .email-capture button {
            padding: 8px 15px;
            background-color: #007bff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .email-capture button:hover {
            background-color: #0056b3;
        }
        .share-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 15px;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .share-btn:hover {
            background-color: #0d95e8;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            .affiliate-box {
                background-color: #2e2e2e;
                border-color: #444;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-capture, .share-btn, nav {
                display: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Mortgage Payoff Calculator</h1>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <div class="ad-slot">
            <!-- AdSense code here -->
        </div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($):</label>
                <input type="number" id="loan_amount" required>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%):</label>
                <input type="number" step="0.01" id="interest_rate" required>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (years):</label>
                <input type="number" id="loan_term_years" required>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
                <input type="number" id="extra_monthly_payment" required>
            </div>
            <button type="button" onclick="calculateMortgage()">Calculate</button>
        </form>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <p>Get weekly free tools</p>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <script>
        function calculateMortgage() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermYears = parseInt(document.getElementById('loan_term_years').value);
            const extraMonthlyPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermYears) || isNaN(extraMonthlyPayment)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            const n = loanTermYears * 12;
            const monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -n));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (balance > 0) {
                const interest = balance * interestRate;
                const principal = Math.min(monthlyPayment + extraMonthlyPayment - interest, balance);
                balance -= principal;
                totalInterest += interest;
                months++;
            }

            const originalTotalInterest = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -n)) * n - loanAmount;
            const yearsSaved = loanTermYears - Math.floor(months / 12);
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('results').innerHTML = `
                <h3>Results</h3>
                <p>Years Saved: ${yearsSaved}</p>
                <p>Interest Saved: $${interestSaved.toFixed(2)}</p>
                <canvas id="amortizationChart" width="400" height="200"></canvas>
            `;

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Term', 'With Extra Payments'],
                    datasets: [{
                        label: 'Months',
                        data: [loanTermYears * 12, months],
                        backgroundColor: ['rgba(75, 192, 192, 0.2)', 'rgba(153, 102, 255, 0.2)'],
                        borderColor: ['rgba(75, 192, 192, 1)', 'rgba(153, 102, 255, 1)'],
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?text=Check out this Mortgage Payoff Calculator!&url=${encodeURIComponent(url)}`, '_blank');
        }
    </script>
</body>
</html>
