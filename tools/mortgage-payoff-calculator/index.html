<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/og-image.jpg">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments slash your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/mortgage-payoff-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2, h3, h4 {
            color: #333;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e0f7fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #00796b;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            background-color: #00796b;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 5px;
        }
        .share-btn {
            margin-top: 10px;
            display: inline-block;
            padding: 10px 15px;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .email-capture {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 5px;
        }
        .email-capture input[type="email"] {
            width: calc(100% - 120px);
            padding: 8px;
            box-sizing: border-box;
            margin-right: 10px;
        }
        .email-capture button {
            width: 100px;
        }
        nav {
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #00796b;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .affiliate-box, .results, .email-capture {
                background-color: #1e1e1e;
            }
            .affiliate-btn, button, .share-btn {
                background-color: #004d40;
            }
            nav a {
                color: #80cbc4;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
        <h1>Mortgage Payoff Calculator</h1>
        <div class="ad-slot"><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=pub-7483634241992957" crossorigin="anonymous"></script>
<ins class="adsbygoogle" style="display:block" data-ad-client="pub-7483634241992957" data-ad-slot="f08c47fec0942fa0" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script></div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($):</label>
                <input type="number" id="loan_amount" required>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%):</label>
                <input type="number" id="interest_rate" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (Years):</label>
                <input type="number" id="loan_term_years" required>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
                <input type="number" id="extra_monthly_payment" required>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart" width="400" height="200"></canvas>
            <a href="#" class="share-btn" onclick="shareResults()">Share</a>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h3>Get weekly free tools</h3>
            <input type="email" id="email" placeholder="Your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
    </div>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths) || isNaN(extraPayment)) {
                alert('Please fill in all fields with valid numbers.');
                return;
            }

            const monthlyPayment = (loanAmount * interestRate) / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (balance > 0) {
                const interest = balance * interestRate;
                totalInterest += interest;
                balance += interest - (monthlyPayment + extraPayment);
                months++;
                if (balance < 0) balance = 0;
            }

            const originalTotalInterest = (monthlyPayment * loanTermMonths) - loanAmount;
            const yearsSaved = (loanTermMonths - months) / 12;
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('years_saved').innerText = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').innerText = `Interest Saved: $${interestSaved.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Term', 'New Term'],
                    datasets: [{
                        label: 'Months',
                        data: [loanTermMonths, months],
                        backgroundColor: ['#00796b', '#004d40']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareResults() {
            const url = window.location.href;
            const text = "Check out this Mortgage Payoff Calculator!";
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterUrl, '_blank');
            });
        }
    </script>
</body>
</html>
