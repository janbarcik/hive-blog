<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments can slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="Calculate how extra payments affect your mortgage timeline and interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/mortgage-calculator.png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "Calculate how extra payments affect your mortgage timeline and interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/mortgage-payoff-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #e9ecef;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #ddd;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .email-signup {
            margin-top: 20px;
            text-align: center;
        }
        .email-signup input[type="email"] {
            width: 70%;
            padding: 8px;
            margin-right: 5px;
        }
        .email-signup button {
            padding: 8px 15px;
        }
        .share-btn {
            margin-top: 20px;
            text-align: center;
        }
        .share-btn button {
            padding: 8px 15px;
        }
        nav {
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            color: #007bff;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            .results {
                background-color: #2c2c2c;
            }
            .affiliate-box {
                background-color: #2c2c2c;
                border-color: #444;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-btn, nav {
                display: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Mortgage Payoff Calculator</h1>
    </header>
    <nav>
        <a href="/tools/">Tools Directory</a>
        <a href="/">Home</a>
    </nav>
    <div class="container">
        <div class="ad-slot">
            <!-- AdSense code here -->
        </div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($):</label>
                <input type="number" id="loan_amount" required>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%):</label>
                <input type="number" id="interest_rate" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (Years):</label>
                <input type="number" id="loan_term_years" required>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
                <input type="number" id="extra_monthly_payment" required>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h3>Results</h3>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Sign Up</button>
        </div>
        <div class="share-btn">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths) || isNaN(extraPayment)) {
                alert('Please enter valid numbers in all fields.');
                return;
            }

            const monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;
            let originalTotalInterest = 0;

            while (balance > 0) {
                const interest = balance * interestRate;
                originalTotalInterest += interest;
                totalInterest += interest;
                const principal = Math.min(monthlyPayment + extraPayment - interest, balance);
                balance -= principal;
                months++;
            }

            const originalMonths = loanTermMonths;
            const yearsSaved = (originalMonths - months) / 12;
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('years_saved').textContent = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').textContent = `Interest Saved: $${interestSaved.toFixed(2)}`;

            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Term', 'With Extra Payments'],
                    datasets: [{
                        label: 'Months',
                        data: [originalMonths, months],
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for signing up, ${email}!`);
                document.getElementById('email').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Mortgage Payoff Calculator!`;
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
