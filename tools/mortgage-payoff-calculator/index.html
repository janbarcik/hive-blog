<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e0f7fa;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #00796b;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input[type="number"], input[type="email"] {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #00796b;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004d40;
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .share-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            header, footer {
                background-color: #1f1f1f;
            }
            form, .results {
                background-color: #1f1f1f;
                box-shadow: 0 0 10px rgba(255,255,255,0.1);
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .share-btn, nav, footer {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments slash your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/mortgage-payoff-calculator"
    }
    </script>
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
        <h1>Mortgage Payoff Calculator</h1>
    </header>
    <div class="container">
        <div class="ad-slot">
            <!-- AdSense code here -->
        </div>
        <form id="mortgageForm">
            <label for="loan_amount">Loan Amount:</label>
            <input type="number" id="loan_amount" required>
            <label for="interest_rate">Interest Rate (%):</label>
            <input type="number" id="interest_rate" step="0.01" required>
            <label for="loan_term_years">Loan Term (years):</label>
            <input type="number" id="loan_term_years" required>
            <label for="extra_monthly_payment">Extra Monthly Payment:</label>
            <input type="number" id="extra_monthly_payment" required>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <form id="emailSignup" onsubmit="handleEmailSignup(event)">
            <label for="email">Get weekly free tools:</label>
            <input type="email" id="email" required>
            <button type="submit">Subscribe</button>
        </form>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths) || isNaN(extraPayment)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            const monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let remainingBalance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (remainingBalance > 0) {
                const interestForMonth = remainingBalance * interestRate;
                totalInterest += interestForMonth;
                const principalPayment = Math.min(monthlyPayment + extraPayment - interestForMonth, remainingBalance);
                remainingBalance -= principalPayment;
                months++;
            }

            const originalTotalInterest = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths)) * loanTermMonths - loanAmount;
            const yearsSaved = (loanTermMonths - months) / 12;
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('years_saved').textContent = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').textContent = `Interest Saved: $${interestSaved.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Loan', 'With Extra Payments'],
                    datasets: [{
                        label: 'Total Interest Paid',
                        data: [originalTotalInterest, totalInterest],
                        backgroundColor: ['#ff6384', '#36a2eb']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            alert(`Thank you for subscribing with ${email}!`);
        }

        function shareTool() {
            const url = window.location.href;
            const text = "Check out this Mortgage Payoff Calculator!";
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterUrl, '_blank');
            });
        }
    </script>
</body>
</html>
