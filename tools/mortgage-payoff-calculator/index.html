<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/images/mortgage-calculator.png">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Mortgage Payoff Calculator",
        "description": "See how extra payments slash your mortgage timeline and total interest.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e7f3fe;
            padding: 15px;
            border: 1px solid #b3d4fc;
            margin-top: 20px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #28a745;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
        }
        .error {
            color: red;
            margin-top: 5px;
        }
        .email-signup {
            margin-top: 20px;
            text-align: center;
        }
        .email-signup input[type="email"] {
            padding: 8px;
            width: calc(100% - 100px);
            margin-right: 5px;
        }
        .email-signup button {
            padding: 8px 15px;
        }
        .share-btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 15px;
            background-color: #1da1f2;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container, .results, .affiliate-box {
                background-color: #1e1e1e;
                border-color: #333;
            }
            input[type="number"], input[type="email"] {
                background-color: #333;
                color: #e0e0e0;
            }
            button, .affiliate-btn, .share-btn {
                background-color: #007bff;
            }
            button:hover {
                background-color: #0056b3;
            }
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-btn, nav, footer {
                display: none;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Mortgage Payoff Calculator</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
    </header>
    <div class="container">
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($):</label>
                <input type="number" id="loan_amount" required>
                <div class="error" id="loan_amount_error"></div>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%):</label>
                <input type="number" id="interest_rate" step="0.01" required>
                <div class="error" id="interest_rate_error"></div>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (years):</label>
                <input type="number" id="loan_term_years" required>
                <div class="error" id="loan_term_years_error"></div>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
                <input type="number" id="extra_monthly_payment" required>
                <div class="error" id="extra_monthly_payment_error"></div>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h3>Results</h3>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <a href="#" class="share-btn" onclick="shareTool()">Share this tool</a>
    </div>
    <footer>
        <p>&copy; 2023 Your Website</p>
    </footer>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseFloat(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || loanAmount <= 0) {
                document.getElementById('loan_amount_error').textContent = 'Please enter a valid loan amount.';
                return;
            } else {
                document.getElementById('loan_amount_error').textContent = '';
            }

            if (isNaN(interestRate) || interestRate < 0) {
                document.getElementById('interest_rate_error').textContent = 'Please enter a valid interest rate.';
                return;
            } else {
                document.getElementById('interest_rate_error').textContent = '';
            }

            if (isNaN(loanTermMonths) || loanTermMonths <= 0) {
                document.getElementById('loan_term_years_error').textContent = 'Please enter a valid loan term.';
                return;
            } else {
                document.getElementById('loan_term_years_error').textContent = '';
            }

            if (isNaN(extraPayment) || extraPayment < 0) {
                document.getElementById('extra_monthly_payment_error').textContent = 'Please enter a valid extra payment.';
                return;
            } else {
                document.getElementById('extra_monthly_payment_error').textContent = '';
            }

            const monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let totalInterest = 0;
            let totalInterestWithExtra = 0;
            let balance = loanAmount;
            let balanceWithExtra = loanAmount;
            let months = 0;
            let monthsWithExtra = 0;

            while (balance > 0) {
                const interest = balance * interestRate;
                const principal = monthlyPayment - interest;
                balance -= principal;
                totalInterest += interest;
                months++;
            }

            while (balanceWithExtra > 0) {
                const interest = balanceWithExtra * interestRate;
                const principal = monthlyPayment + extraPayment - interest;
                balanceWithExtra -= principal;
                totalInterestWithExtra += interest;
                monthsWithExtra++;
            }

            const yearsSaved = (months - monthsWithExtra) / 12;
            const interestSaved = totalInterest - totalInterestWithExtra;

            document.getElementById('years_saved').textContent = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').textContent = `Interest Saved: $${interestSaved.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Loan', 'With Extra Payment'],
                    datasets: [{
                        label: 'Months to Payoff',
                        data: [months, monthsWithExtra],
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
                document.getElementById('email').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Mortgage Payoff Calculator!`, '_blank');
        }
    </script>
</body>
</html>
