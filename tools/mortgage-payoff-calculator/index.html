<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2 {
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            background-color: #007bff;
            color: #fff;
            text-align: center;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
        .affiliate-box {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .email-capture {
            margin-top: 20px;
            text-align: center;
        }
        .email-capture input[type="email"] {
            padding: 8px;
            width: 70%;
            margin-right: 5px;
        }
        .email-capture button {
            padding: 8px 12px;
        }
        .share-btn {
            margin-top: 20px;
            text-align: center;
        }
        .share-btn a {
            color: #007bff;
            text-decoration: none;
        }
        .share-btn a:hover {
            text-decoration: underline;
        }
        nav {
            background-color: #343a40;
            color: #fff;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            .affiliate-box {
                background-color: #2e2e2e;
            }
            .btn, .affiliate-btn {
                background-color: #0056b3;
            }
            .btn:hover, .affiliate-btn:hover {
                background-color: #004494;
            }
            nav {
                background-color: #1e1e1e;
            }
        }
        @media print {
            .btn, .affiliate-box, .ad-slot, .email-capture, .share-btn, nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments slash your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://yourwebsite.com/mortgage-payoff-calculator"
    }
    </script>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools Directory</a>
    </nav>
    <div class="container">
        <h1>Mortgage Payoff Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <div class="form-group">
            <label for="loan_amount">Loan Amount ($):</label>
            <input type="number" id="loan_amount" min="0" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="interest_rate">Interest Rate (%):</label>
            <input type="number" id="interest_rate" min="0" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="loan_term_years">Loan Term (years):</label>
            <input type="number" id="loan_term_years" min="1" required>
        </div>
        <div class="form-group">
            <label for="extra_monthly_payment">Extra Monthly Payment ($):</label>
            <input type="number" id="extra_monthly_payment" min="0" step="0.01">
        </div>
        <button class="btn" onclick="calculatePayoff()">Calculate</button>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-capture">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Enter your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-btn">
            <a href="#" onclick="shareTool()">Share this tool</a>
        </div>
    </div>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermYears = parseInt(document.getElementById('loan_term_years').value);
            const extraMonthlyPayment = parseFloat(document.getElementById('extra_monthly_payment').value) || 0;

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermYears)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            const n = loanTermYears * 12;
            const monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -n));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (balance > 0) {
                const interest = balance * interestRate;
                const principal = Math.min(monthlyPayment + extraMonthlyPayment - interest, balance);
                balance -= principal;
                totalInterest += interest;
                months++;
            }

            const originalTotalInterest = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -n)) * n - loanAmount;
            const yearsSaved = loanTermYears - Math.floor(months / 12);
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('results').innerHTML = `
                <h2>Results</h2>
                <p>Years Saved: ${yearsSaved}</p>
                <p>Interest Saved: $${interestSaved.toFixed(2)}</p>
                <canvas id="amortizationChart" width="400" height="200"></canvas>
            `;

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original', 'With Extra Payment'],
                    datasets: [{
                        label: 'Total Interest Paid',
                        data: [originalTotalInterest, totalInterest],
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function shareTool() {
            const url = window.location.href;
            const text = 'Check out this Mortgage Payoff Calculator!';
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
                window.open(twitterUrl, '_blank');
            });
        }
    </script>
</body>
</html>
