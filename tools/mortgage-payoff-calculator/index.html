<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourwebsite.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://yourwebsite.com/og-image.jpg">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments slash your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        header, footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 1em 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .ad-slot {
            margin: 20px 0;
            text-align: center;
        }
        .affiliate-box {
            background-color: #e0f7fa;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #00796b;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            background-color: #00796b;
            color: #fff;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004d40;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #fff;
            border-radius: 5px;
        }
        .error {
            color: red;
            margin-top: 5px;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            header, footer {
                background-color: #1f1f1f;
            }
            .affiliate-box {
                background-color: #004d40;
            }
            .affiliate-btn {
                background-color: #004d40;
            }
            .results {
                background-color: #1f1f1f;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Mortgage Payoff Calculator</h1>
        <nav>
            <a href="/tools/" style="color: #fff; margin-right: 15px;">Tools Directory</a>
            <a href="/" style="color: #fff;">Home</a>
        </nav>
    </header>
    <div class="container">
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="mortgageForm">
            <div class="form-group">
                <label for="loan_amount">Loan Amount ($)</label>
                <input type="number" id="loan_amount" required>
                <div class="error" id="loan_amount_error"></div>
            </div>
            <div class="form-group">
                <label for="interest_rate">Interest Rate (%)</label>
                <input type="number" step="0.01" id="interest_rate" required>
                <div class="error" id="interest_rate_error"></div>
            </div>
            <div class="form-group">
                <label for="loan_term_years">Loan Term (Years)</label>
                <input type="number" id="loan_term_years" required>
                <div class="error" id="loan_term_years_error"></div>
            </div>
            <div class="form-group">
                <label for="extra_monthly_payment">Extra Monthly Payment ($)</label>
                <input type="number" id="extra_monthly_payment" required>
                <div class="error" id="extra_monthly_payment_error"></div>
            </div>
            <button type="button" onclick="calculatePayoff()">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div>
            <h3>Get weekly free tools</h3>
            <form onsubmit="handleEmailSignup(event)">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
        <div>
            <button onclick="sharePage()">Share</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2023 Mortgage Payoff Calculator</p>
    </footer>
    <script>
        function validateInputs() {
            let isValid = true;
            const loanAmount = document.getElementById('loan_amount').value;
            const interestRate = document.getElementById('interest_rate').value;
            const loanTermYears = document.getElementById('loan_term_years').value;
            const extraMonthlyPayment = document.getElementById('extra_monthly_payment').value;

            if (loanAmount <= 0) {
                document.getElementById('loan_amount_error').textContent = "Please enter a valid loan amount.";
                isValid = false;
            } else {
                document.getElementById('loan_amount_error').textContent = "";
            }

            if (interestRate <= 0) {
                document.getElementById('interest_rate_error').textContent = "Please enter a valid interest rate.";
                isValid = false;
            } else {
                document.getElementById('interest_rate_error').textContent = "";
            }

            if (loanTermYears <= 0) {
                document.getElementById('loan_term_years_error').textContent = "Please enter a valid loan term.";
                isValid = false;
            } else {
                document.getElementById('loan_term_years_error').textContent = "";
            }

            if (extraMonthlyPayment < 0) {
                document.getElementById('extra_monthly_payment_error').textContent = "Extra payment cannot be negative.";
                isValid = false;
            } else {
                document.getElementById('extra_monthly_payment_error').textContent = "";
            }

            return isValid;
        }

        function calculatePayoff() {
            if (!validateInputs()) return;

            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraMonthlyPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            let monthlyPayment = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            while (balance > 0) {
                let interest = balance * interestRate;
                totalInterest += interest;
                balance = balance + interest - (monthlyPayment + extraMonthlyPayment);
                months++;
                if (balance < 0) balance = 0;
            }

            const originalTotalInterest = loanAmount * interestRate / (1 - Math.pow(1 + interestRate, -loanTermMonths)) * loanTermMonths - loanAmount;
            const yearsSaved = (loanTermMonths - months) / 12;
            const interestSaved = originalTotalInterest - totalInterest;

            document.getElementById('years_saved').textContent = `Years Saved: ${yearsSaved.toFixed(2)}`;
            document.getElementById('interest_saved').textContent = `Interest Saved: $${interestSaved.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: months}, (_, i) => i + 1),
                    datasets: [{
                        label: 'Balance Over Time',
                        data: Array.from({length: months}, (_, i) => loanAmount * Math.pow(1 + interestRate, i) - (monthlyPayment + extraMonthlyPayment) * (Math.pow(1 + interestRate, i) - 1) / interestRate),
                        borderColor: 'rgba(75, 192, 192, 1)',
                        fill: false
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Months'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Balance ($)'
                            }
                        }
                    }
                }
            });
        }

        function handleEmailSignup(event) {
            event.preventDefault();
            alert('Thank you for subscribing!');
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`, '_blank');
        }
    </script>
</body>
</html>
