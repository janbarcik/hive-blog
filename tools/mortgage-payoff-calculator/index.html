<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments can reduce your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="Calculate how extra payments can reduce your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://example.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Mortgage Payoff Calculator",
      "description": "See how extra payments can reduce your mortgage timeline and total interest.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "All",
      "url": "https://example.com/mortgage-payoff-calculator"
    }
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            text-align: center;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results, .affiliate-box, .ad-slot, .email-signup, .share {
            margin-top: 20px;
        }
        .affiliate-box {
            background-color: #f9f9f9;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background-color: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background-color: #218838;
        }
        .email-signup input[type="email"] {
            width: calc(100% - 120px);
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .email-signup button {
            width: 100px;
            padding: 10px;
            background-color: #17a2b8;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .email-signup button:hover {
            background-color: #138496;
        }
        .share button {
            width: auto;
            padding: 10px;
            background-color: #ffc107;
            color: #333;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .share button:hover {
            background-color: #e0a800;
        }
        nav {
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #e0e0e0;
            }
            .container {
                background-color: #1e1e1e;
            }
            input[type="number"], .email-signup input[type="email"] {
                background-color: #333;
                color: #e0e0e0;
                border-color: #444;
            }
            button, .affiliate-btn, .email-signup button, .share button {
                color: #fff;
            }
        }
        @media print {
            .affiliate-box, .ad-slot, .email-signup, .share, nav {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/tools/">Tools</a>
    </nav>
    <div class="container">
        <h1>Mortgage Payoff Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <div>
            <input type="number" id="loan_amount" placeholder="Loan Amount ($)" min="0" required>
            <input type="number" id="interest_rate" placeholder="Interest Rate (%)" min="0" step="0.01" required>
            <input type="number" id="loan_term_years" placeholder="Loan Term (Years)" min="0" required>
            <input type="number" id="extra_monthly_payment" placeholder="Extra Monthly Payment ($)" min="0">
            <button onclick="calculatePayoff()">Calculate</button>
        </div>
        <div class="results" id="results"></div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <input type="email" id="email" placeholder="Enter your email">
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    <script>
        function calculatePayoff() {
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value) || 0;

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            let remainingBalance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            const monthlyPayment = (loanAmount * interestRate) / (1 - Math.pow(1 + interestRate, -loanTermMonths));

            while (remainingBalance > 0) {
                const interestForMonth = remainingBalance * interestRate;
                totalInterest += interestForMonth;
                const principalPayment = monthlyPayment + extraPayment - interestForMonth;
                remainingBalance -= principalPayment;
                months++;
                if (months > loanTermMonths) break; // Safety check to prevent infinite loop
            }

            const yearsSaved = loanTermMonths / 12 - months / 12;
            const interestSaved = (monthlyPayment * loanTermMonths - loanAmount) - totalInterest;

            document.getElementById('results').innerHTML = `
                <h2>Results</h2>
                <p>Years Saved: ${yearsSaved.toFixed(2)}</p>
                <p>Interest Saved: $${interestSaved.toFixed(2)}</p>
                <canvas id="amortizationChart" width="400" height="200"></canvas>
            `;

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Original Loan', 'With Extra Payments'],
                    datasets: [{
                        label: 'Total Interest',
                        data: [(monthlyPayment * loanTermMonths - loanAmount), totalInterest],
                        backgroundColor: ['#007bff', '#28a745']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert(`Thank you for subscribing with ${email}!`);
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            const text = "Check out this Mortgage Payoff Calculator!";
            const twitterUrl = `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(twitterUrl, '_blank');
        }
    </script>
</body>
</html>
