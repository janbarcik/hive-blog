<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Payoff Calculator</title>
    <meta name="description" content="See how extra payments slash your mortgage timeline and total interest with our Mortgage Payoff Calculator.">
    <meta property="og:title" content="Mortgage Payoff Calculator">
    <meta property="og:description" content="See how extra payments slash your mortgage timeline and total interest.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://example.com/mortgage-payoff-calculator">
    <meta property="og:image" content="https://example.com/image.jpg">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: #f4f4f9;
            color: #333;
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #121212;
                color: #f4f4f9;
            }
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        @media (prefers-color-scheme: dark) {
            .container {
                background: #1e1e1e;
            }
        }
        h1, h2, h4 {
            text-align: center;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .results, .affiliate-box, .ad-slot {
            margin-top: 20px;
        }
        .affiliate-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }
        @media (prefers-color-scheme: dark) {
            .affiliate-box {
                background: #2e2e2e;
            }
        }
        .affiliate-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #28a745;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .affiliate-btn:hover {
            background: #218838;
        }
        .ad-slot {
            text-align: center;
            padding: 10px;
            background: #e9ecef;
            border-radius: 5px;
        }
        @media (prefers-color-scheme: dark) {
            .ad-slot {
                background: #3e3e3e;
            }
        }
        .email-signup {
            margin-top: 20px;
            text-align: center;
        }
        .email-signup input[type="email"] {
            width: calc(100% - 120px);
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .email-signup button {
            width: 100px;
            padding: 10px;
            background: #ffc107;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .email-signup button:hover {
            background: #e0a800;
        }
        .share-btn {
            margin-top: 20px;
            text-align: center;
        }
        .share-btn button {
            padding: 10px 20px;
            background: #17a2b8;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .share-btn button:hover {
            background: #138496;
        }
        nav {
            text-align: center;
            margin-bottom: 20px;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #007bff;
        }
        nav a:hover {
            text-decoration: underline;
        }
        @media print {
            .ad-slot, .affiliate-box, .email-signup, .share-btn, nav {
                display: none;
            }
        }
    </style>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Mortgage Payoff Calculator",
        "description": "See how extra payments slash your mortgage timeline and total interest.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All",
        "url": "https://example.com/mortgage-payoff-calculator"
    }
    </script>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">Home</a>
            <a href="/tools/">Tools</a>
        </nav>
        <h1>Mortgage Payoff Calculator</h1>
        <div class="ad-slot"><!-- AdSense code here --></div>
        <form id="mortgageForm">
            <input type="number" id="loan_amount" placeholder="Loan Amount ($)" required>
            <input type="number" id="interest_rate" placeholder="Interest Rate (%)" step="0.01" required>
            <input type="number" id="loan_term_years" placeholder="Loan Term (years)" required>
            <input type="number" id="extra_monthly_payment" placeholder="Extra Monthly Payment ($)" required>
            <button type="submit">Calculate</button>
        </form>
        <div class="results" id="results" style="display:none;">
            <h2>Results</h2>
            <p id="years_saved"></p>
            <p id="interest_saved"></p>
            <canvas id="amortizationChart"></canvas>
        </div>
        <div class="affiliate-box">
            <h4>💡 Recommended</h4>
            <p>Compare today's lowest mortgage rates [affiliate link]</p>
            <a href="#affiliate-placeholder" class="affiliate-btn" target="_blank" rel="noopener sponsored">See Top Picks →</a>
            <small>Affiliate disclosure: We earn a small commission at no cost to you.</small>
        </div>
        <div class="email-signup">
            <h4>Get weekly free tools</h4>
            <input type="email" id="email" placeholder="Your email" required>
            <button onclick="handleEmailSignup()">Subscribe</button>
        </div>
        <div class="share-btn">
            <button onclick="sharePage()">Share this tool</button>
        </div>
    </div>
    <script>
        document.getElementById('mortgageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const loanAmount = parseFloat(document.getElementById('loan_amount').value);
            const interestRate = parseFloat(document.getElementById('interest_rate').value) / 100 / 12;
            const loanTermMonths = parseInt(document.getElementById('loan_term_years').value) * 12;
            const extraPayment = parseFloat(document.getElementById('extra_monthly_payment').value);

            if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(loanTermMonths) || isNaN(extraPayment)) {
                alert('Please enter valid numbers for all fields.');
                return;
            }

            const monthlyPayment = (loanAmount * interestRate) / (1 - Math.pow(1 + interestRate, -loanTermMonths));
            let balance = loanAmount;
            let totalInterest = 0;
            let months = 0;

            const originalAmortization = [];
            const newAmortization = [];

            while (balance > 0) {
                const interest = balance * interestRate;
                totalInterest += interest;
                const principal = monthlyPayment - interest;
                balance -= principal;
                originalAmortization.push({ balance: Math.max(balance, 0), interest });

                const newInterest = balance * interestRate;
                const newPrincipal = monthlyPayment + extraPayment - newInterest;
                balance -= newPrincipal;
                newAmortization.push({ balance: Math.max(balance, 0), interest: newInterest });

                months++;
                if (balance <= 0) break;
            }

            const originalTotalInterest = originalAmortization.reduce((sum, p) => sum + p.interest, 0);
            const newTotalInterest = newAmortization.reduce((sum, p) => sum + p.interest, 0);

            document.getElementById('years_saved').textContent = `Years Saved: ${(loanTermMonths - months) / 12}`;
            document.getElementById('interest_saved').textContent = `Interest Saved: $${(originalTotalInterest - newTotalInterest).toFixed(2)}`;

            const ctx = document.getElementById('amortizationChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({ length: months }, (_, i) => i + 1),
                    datasets: [
                        {
                            label: 'Original Balance',
                            data: originalAmortization.map(p => p.balance),
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1,
                            fill: false
                        },
                        {
                            label: 'New Balance',
                            data: newAmortization.map(p => p.balance),
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1,
                            fill: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Month'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Balance ($)'
                            }
                        }
                    }
                }
            });

            document.getElementById('results').style.display = 'block';
        });

        function handleEmailSignup() {
            const email = document.getElementById('email').value;
            if (email) {
                alert('Thank you for subscribing!');
                document.getElementById('email').value = '';
            } else {
                alert('Please enter a valid email address.');
            }
        }

        function sharePage() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('URL copied to clipboard!');
            });
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Check out this Mortgage Payoff Calculator!`, '_blank');
        }
    </script>
</body>
</html>
